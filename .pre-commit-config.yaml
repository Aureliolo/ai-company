ci:
  autoupdate_schedule: never
  autofix_prs: true
  autofix_commit_msg: "style: auto-fix pre-commit hooks"
  # Hooks listed here are skipped ONLY on pre-commit.ci. They still run
  # on every developer machine and in any CI job that invokes pre-commit
  # directly. Skip reasons, grouped by category:
  #   - commitizen / gitleaks / hadolint-docker / caddy-validate:
  #     covered by dedicated CI jobs; re-running on pre-commit.ci adds
  #     latency without adding signal.
  #   - mypy / pytest-unit / go-* / eslint-web:
  #     too slow / toolchain-heavy for the cloud runner.
  #   - no-em-dashes / no-redundant-timeout / forbidden-literals /
  #     persistence-boundary / no-new-logger-exception-str-exc /
  #     orphan-fixtures:
  #     scoped gates that need ``uv`` + repo source -- redundant given
  #     the `Lint` + `Forbidden literals gate` jobs in ci.yml.
  #   - check-push-rebased / check-single-migration-per-pr /
  #     check-no-modify-migration:
  #     rebase / migration state checks meaningful only on the pushing
  #     developer's clone, not in an ephemeral cloud runner.
  # ``no-release-please-token`` and ``workflow-shell-git-commits`` are
  # deliberately NOT skipped: both are pure-Python, zero-dependency
  # scripts with no CI counterpart, and letting pre-commit.ci enforce
  # them closes the gap where a PR from a contributor who skipped local
  # hooks would otherwise introduce a regression unchecked.
  skip: [commitizen, gitleaks, hadolint-docker, caddy-validate, no-em-dashes, no-redundant-timeout, mypy, pytest-unit, golangci-lint, go-vet, go-test, eslint-web, check-push-rebased, check-single-migration-per-pr, check-no-modify-migration, forbidden-literals, persistence-boundary, no-new-logger-exception-str-exc, orphan-fixtures]

default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: local
    hooks:
      - id: check-push-rebased
        name: check push rebased (block if behind main)
        entry: bash
        args: ["scripts/check_push_rebased.sh"]
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
        types: []
      - id: check-single-migration-per-pr
        name: enforce at most one new Atlas migration per PR
        entry: bash
        args: ["scripts/check_single_migration_per_pr.sh"]
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit, pre-push]
        types: []
      - id: check-no-modify-migration
        name: block modification of existing migration files
        entry: bash
        args: ["scripts/check_no_modify_migration.sh"]
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
        types: []
      - id: orphan-fixtures
        name: orphan pytest fixtures (opt-in via SYNTHORG_CHECK_ORPHAN_FIXTURES=1)
        entry: uv run python scripts/check_orphan_fixtures.py
        language: system
        files: ^tests/.*\.py$
        pass_filenames: false
        stages: [pre-push]
        always_run: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^(src/synthorg/templates/builtins/|mkdocs\.yml$)
      - id: check-yaml
        name: check-yaml (mkdocs, unsafe for !!python tags)
        args: [--unsafe]
        files: ^mkdocs\.yml$
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: no-commit-to-branch
        args: [--branch, main]
      - id: check-symlinks
      - id: check-case-conflict
      - id: debug-statements
        types: [python]
      - id: detect-private-key
        # - tests/ contains deliberate fixtures with PEM-looking literals.
        # - docs/reference/github-environments.md documents the exact
        #   ``-----BEGIN / END RSA PRIVATE KEY-----`` marker lines so
        #   operators can recognise a correct copy-paste; the file
        #   obviously contains no real key.
        exclude: ^(tests/|docs/reference/github-environments\.md$)
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.10
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker

  - repo: local
    hooks:
      - id: caddy-validate
        name: caddy validate (Caddyfile)
        entry: bash
        args: ["scripts/caddy-validate.sh"]
        language: system
        files: ^web/Caddyfile$
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: no-em-dashes
        name: no em-dashes (U+2014)
        entry: uv
        args: [run, python, scripts/check_no_em_dashes.py]
        language: system
        types: [text]

      - id: no-redundant-timeout
        name: no redundant pytest.mark.timeout(30)
        entry: uv
        args: [run, python, scripts/check_no_redundant_timeout.py]
        language: system
        files: ^tests/.*\.py$

      - id: no-new-logger-exception-str-exc
        name: block new logger.exception(..., error=str(exc)) sites (SEC-1)
        entry: uv
        args: [run, python, scripts/check_logger_exception_str_exc.py]
        language: system
        files: ^src/synthorg/.*\.py$

      - id: no-release-please-token
        name: forbid new RELEASE_PLEASE_TOKEN references (#1555)
        entry: uv
        args: [run, python, scripts/check_no_release_please_token.py]
        language: system
        files: ^\.github/.*\.ya?ml$

      - id: workflow-shell-git-commits
        name: block shell git commit+push in workflows (must mint App token)
        entry: uv
        args: [run, python, scripts/check_workflow_shell_git_commits.py]
        language: system
        files: ^\.github/workflows/.*\.ya?ml$

      - id: mypy
        name: mypy type-check (affected modules)
        entry: uv run python scripts/run_affected_mypy.py
        language: system
        files: ^(src/|tests/).*\.py$
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-unit
        name: pytest unit tests (affected modules)
        entry: uv run python scripts/run_affected_tests.py
        language: system
        files: ^(src/|tests/).*\.py$
        pass_filenames: false
        stages: [pre-push]

      - id: golangci-lint
        name: golangci-lint (CLI)
        entry: bash -c "cd cli && golangci-lint run"
        language: system
        files: ^cli/.*\.go$
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: go-vet
        name: go vet (CLI)
        entry: go -C cli vet ./...
        language: system
        files: ^cli/.*\.go$
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: go-test
        name: go test (CLI)
        entry: go -C cli test ./...
        language: system
        files: ^cli/.*\.go$
        pass_filenames: false
        stages: [pre-push]

      - id: eslint-web
        name: ESLint (web dashboard)
        entry: npm --prefix web run lint
        language: system
        files: ^web/src/.*\.(ts|tsx)$
        pass_filenames: false
        # Pre-push only: ESLint boots the TS project graph which can
        # take 15-30s locally even on unrelated backend commits. The
        # dedicated ``dashboard-lint`` CI job still gates pushes that
        # land on the branch, so nothing escapes review.
        stages: [pre-push]

      - id: forbidden-literals
        name: forbidden-literal gate (src/synthorg)
        entry: uv run python scripts/check_forbidden_literals.py
        language: system
        files: ^src/synthorg/.*\.py$
        pass_filenames: false
        stages: [pre-push]

      - id: persistence-boundary
        name: persistence-boundary gate (src/ + tests/)
        entry: uv run python scripts/check_persistence_boundary.py
        language: system
        files: ^(src/synthorg|tests)/.*\.py$
        pass_filenames: false
        stages: [pre-push]
