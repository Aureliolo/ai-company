server {
    listen 80;
    server_name chs00013.eu.hcnet.biz;

    root /usr/share/nginx/html;

    location = / {
        return 200 '<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynthOrg UX Mockups</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; color: #e2e8f0; font-family: Inter, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .container { max-width: 700px; padding: 3rem; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
  p { color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }
  .cards { display: flex; flex-direction: column; gap: 1rem; }
  a { text-decoration: none; display: block; padding: 1.25rem 1.5rem; border-radius: 8px; background: #13131f; border: 1px solid #1e1e2e; transition: border-color 0.2s, background 0.2s; }
  a:hover { border-color: #6366f1; background: #16162a; }
  .label { font-weight: 600; color: #f1f5f9; margin-bottom: 0.25rem; }
  .desc { font-size: 0.8rem; color: #64748b; }
  .tag { display: inline-block; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; margin-left: 0.5rem; font-weight: 500; }
  .react { background: #1e3a5f; color: #60a5fa; }
  .vue { background: #1a3a2a; color: #4ade80; }
</style>
</head>
<body>
<div class="container">
  <h1>SynthOrg Dashboard Mockups</h1>
  <p>3 design directions, 3 pages each. Compare side-by-side.</p>
  <div class="cards">
    <a href="/cd/">
      <div class="label">C+D: Mission Control + Ambient <span class="tag react">React</span></div>
      <div class="desc">Dense data panels, sparklines, department health bars, activity stream, budget forecast. Professional command center.</div>
    </a>
    <a href="/bd/">
      <div class="label">B+D: Neural Network + Ambient <span class="tag vue">Vue 3</span></div>
      <div class="desc">Force-directed graph centerpiece, glowing agent nodes, pulsing communication edges, ambient activity tray.</div>
    </a>
    <a href="/db/">
      <div class="label">D+B: Ambient Org + Graph Accent <span class="tag react">React</span></div>
      <div class="desc">Typography-first, prose-driven status, mini org graph widget, calm and restrained. Linear meets Bloomberg.</div>
    </a>
  </div>
</div>
</body>
</html>';
        add_header Content-Type text/html;
    }

    location /cd/ {
        alias /usr/share/nginx/html/cd/;
        try_files $uri $uri/ /cd/index.html;
    }

    location /bd/ {
        alias /usr/share/nginx/html/bd/;
        try_files $uri $uri/ /bd/index.html;
    }

    location /db/ {
        alias /usr/share/nginx/html/db/;
        try_files $uri $uri/ /db/index.html;
    }
}
