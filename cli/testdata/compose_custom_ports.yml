# Generated by SynthOrg CLI dev
# Do not edit manually -- run 'synthorg init' to regenerate.

services:

  # Init container: chown named volumes to the correct non-root UID per service.
  # Fresh Docker named volumes are root-owned; DHI images run as non-root and
  # cannot self-chown, so this one-shot container sets ownership on first start.
  data-init:
    # renovate: datasource=docker depName=busybox
    image: busybox:1.37-musl@sha256:19b646668802469d968a05342a601e78da4322a414a7c09b1c9ee25165042138
    volumes:
      - synthorg-data:/data
    command: ["sh", "-c", "set -e; mkdir -p /data/logs /data/memory; chown -R 65532:65532 /data"]
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER

  backend:
    image: ghcr.io/aureliolo/synthorg-backend:v0.2.0
    ports:
      - "9000:3001"
    volumes:
      - synthorg-data:/data
    depends_on:
      data-init:
        condition: service_completed_successfully
    environment:
      # SYNTHORG_HOST/SYNTHORG_PORT/UVICORN_HOST/UVICORN_PORT are baked
      # into the backend image ENV -- see docker/backend/Dockerfile.
      # Setting them here only duplicates the defaults; operators who
      # need to override still do so via env_file / shell env, which
      # docker-compose forwards into the container.
      SYNTHORG_DB_PATH: "/data/synthorg.db"
      SYNTHORG_MEMORY_DIR: "/data/memory"
      SYNTHORG_PERSISTENCE_BACKEND: "sqlite"
      SYNTHORG_MEMORY_BACKEND: "mem0"
      SYNTHORG_BUS_BACKEND: "internal"
      SYNTHORG_LOG_DIR: "/data/logs"
      MEM0_TELEMETRY: "false"
      SYNTHORG_TELEMETRY: "false"
      SYNTHORG_LOG_LEVEL: "debug"
      SYNTHORG_JWT_SECRET: "test-secret-value"
      SYNTHORG_SETTINGS_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      # HMAC signing key for opaque pagination cursor tokens. The
      # backend refuses to start without one (see synthorg.api.app
      # create_app); rotating it would invalidate every outstanding
      # cursor on every restart. Treat as permanent for the life of
      # the install. The boot guard is the same in dev, pre-release,
      # and prod -- there is no env-marker exception.
      SYNTHORG_PAGINATION_CURSOR_SECRET: "test-cursor-secret-stable-value"
    # Image sets USER 65532 (docker/backend/Dockerfile); no compose
    # override needed.
    # CIS Docker Benchmark v1.6.0 hardening (5.3, 5.12, 5.25, 5.28)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
          pids: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Healthcheck defined in Dockerfile -- do not override here.

  web:
    image: ghcr.io/aureliolo/synthorg-web:v0.2.0
    ports:
      - "4000:8080"
    depends_on:
      backend:
        condition: service_healthy
    # apko image sets run-as: "65532" (docker/web/apko.yaml); no
    # compose override needed.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=16m
      - /config/caddy:noexec,nosuid,nodev,size=8m
      - /data/caddy:noexec,nosuid,nodev,size=16m
    healthcheck:
      # Caddy serves a plain "ok" 200 at /healthz; the apko image
      # includes wget solely for this probe. Target 127.0.0.1 to avoid
      # DNS resolution in the probe hot path.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
          pids: 64
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: synthorg-net

volumes:
  synthorg-data:
