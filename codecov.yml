# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        # Require overall coverage to stay near the current baseline.
        # The 0.5% threshold absorbs measurement noise (xdist ordering,
        # coverage rounding, tiny refactors that move a branch by one
        # test run) without materially weakening the gate -- any real
        # regression of more than half a percent still trips the check.
        target: auto
        threshold: 0.5%
        if_ci_failed: error
    patch:
      default:
        # Patch coverage target: every diff must hit at least 70% of
        # its own added lines. This is deliberately lower than the
        # project baseline (~85%) because diffs routinely include
        # defense-in-depth error paths (OS permission failures,
        # mock-only docker responses, rare exception handlers) whose
        # behaviour is easy to reason about by inspection and
        # expensive to exercise with real tests. The 70% floor still
        # keeps most patches well-tested while not forcing mocks of
        # every syscall boundary.
        target: 70%
        if_ci_failed: error
