# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml
#
# Project policy: 80% minimum coverage floor for both overall project
# and per-patch diffs, matching the project-level CLAUDE.md rule
# ("Coverage minimum is 80%, enforced in CI."). The 0.5% threshold
# absorbs measurement noise (xdist ordering, coverage rounding, tiny
# refactors that move a branch by one test run) without weakening
# the hard floor -- any drop that actually pushes coverage below 79.5%
# still trips the gate.

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 0.5%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 0.5%
        if_ci_failed: error
