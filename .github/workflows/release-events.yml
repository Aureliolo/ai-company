name: Release Events

# Pipeline-observability fan-in to a single pinned GitHub Issue (identified
# by label `automation:release-events`). Fires on four signals:
#   - stable release published
#   - dev pre-release cut
#   - auto-rollover.yml completed (success or failure)
#   - test-signing.yml completed (failure only)
#
# Each event posts a single comment on the pinned issue. The pinned issue
# is created on-demand if it does not already exist. No chat webhook
# secrets required -- everything stays inside the repo.

on:
  release:
    types: [published, prereleased]
  workflow_run:
    workflows: [Auto Rollover, Test Signing]
    types: [completed]

permissions: {}

jobs:
  dispatch:
    name: Post release event
    # Skip noisy early-exit runs: auto-rollover that decided no rollover
    # was needed would still fire this workflow otherwise. The tracking
    # issue only cares about *actual* rollover commits. We keep
    # test-signing failures always (that's the whole point of the sink).
    #
    # Expression below intentionally avoids the ``? :`` ternary -- GitHub
    # Actions' expression language does not support it. Equivalent logic
    # expressed as ``cond && a || cond-not && b`` branches per workflow
    # name so Test Signing failures always post while Auto Rollover posts
    # on any non-skipped conclusion.
    #
    # SAFETY (``workflow_run`` is the exploitable trigger zizmor flags):
    # ``workflow_run.event != 'pull_request'`` is asserted explicitly so
    # a future change to Auto Rollover / Test Signing that adds a
    # ``pull_request`` trigger can never cause this sink to run under a
    # PR-controlled context. Combined with the fact that the sink does
    # not check out PR code, does not read PR title/body/artifacts, and
    # interpolates only ``github.event.{release,workflow_run}.*``
    # (GitHub-managed fields, not user input), the structural properties
    # needed to weaponize a ``workflow_run`` trigger are all absent here.
    # The paired ``dangerous-triggers`` entry in ``.github/.zizmor.yml``
    # suppresses the false-positive finding and points back at this
    # explanation.
    if: >-
      github.event_name == 'release'
      || (github.event_name == 'workflow_run'
          && github.event.workflow_run.event != 'pull_request'
          && github.event.workflow_run.conclusion != null
          && ((github.event.workflow_run.name == 'Test Signing'
               && github.event.workflow_run.conclusion == 'failure')
              || (github.event.workflow_run.name != 'Test Signing'
                  && github.event.workflow_run.conclusion != 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      actions: read
      statuses: write
    steps:
      # Commit-status surfacing for the workflow_run path. Without this,
      # release-events failures are invisible: the originating commit is
      # already on main with all green checks (Auto Rollover / Test
      # Signing finished before this fan-in fired), and a workflow_run-
      # triggered job posts no status of its own. Skipped on the
      # ``release`` path because that event has no single commit to
      # attach to (it points at a tag).
      - name: Report status (pending)
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          UPSTREAM: ${{ github.event.workflow_run.name }}
        run: |
          set -euo pipefail
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" \
            -f state=pending \
            -f context=release-events \
            -f description="Posting ${UPSTREAM} event" \
            -f target_url="$RUN_URL"

      - name: Compose + post event
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          WF_RUN_NAME: ${{ github.event.workflow_run.name }}
          WF_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WF_RUN_URL: ${{ github.event.workflow_run.html_url }}
          WF_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          # Resolve / create the pinned tracking issue by label.
          TITLE='Release pipeline events'
          LABEL='automation:release-events'
          ISSUE_NUMBER=$(gh issue list --state open --label "$LABEL" \
            --search "in:title \"$TITLE\"" --json number,title \
            --jq '[.[] | select(.title == "'"$TITLE"'")] | .[0].number // empty')

          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_BODY=$(cat <<'EOF'
          Rolling log of release-pipeline events. Posted to by
          `.github/workflows/release-events.yml`. Close this issue to
          reset the log; a fresh one will be opened on the next event.

          Legend:
          - **stable** -- a v[major].[minor].[patch] release was published.
          - **dev** -- a dev pre-release was cut.
          - **rollover** -- `auto-rollover.yml` fired with an outcome.
          - **signing-failure** -- `test-signing.yml` detected a regression.
          EOF
          )
            # ``gh issue create`` prints the issue URL to stdout (its
            # ``--json`` flag support has been historically inconsistent
            # across gh versions; parsing the URL works on every
            # version). Extract the trailing issue number from
            # ``https://github.com/owner/repo/issues/<N>``.
            # If the label is missing (e.g. someone deleted it from the
            # repo's label set), gh exits non-zero -- fall back to a
            # label-less create so the event still lands and the
            # missing-label condition surfaces as a workflow warning.
            if ! ISSUE_URL=$(gh issue create --title "$TITLE" \
                --label "$LABEL" \
                --body "$ISSUE_BODY" 2>&1); then
              echo "::warning::labeled issue create failed: $ISSUE_URL -- retrying without labels"
              ISSUE_URL=$(gh issue create --title "$TITLE" --body "$ISSUE_BODY")
            fi
            ISSUE_NUMBER="${ISSUE_URL##*/}"
            echo "Created tracking issue #$ISSUE_NUMBER"
          fi

          # Pin the rolling-events issue for visibility -- same
          # best-effort pattern as test-signing.yml / release-pipeline-
          # health.yml report-failure jobs. A repo holds at most 3
          # pinned issues; the release automation's tracking set fits
          # under that cap (events log + signing regression + health
          # regression). Pin failures degrade to ``::warning::``.
          if ! gh api --method PUT \
              "repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/pin" \
              --silent 2>/dev/null; then
            echo "::warning::could not pin tracking issue #$ISSUE_NUMBER (quota / race / permission)"
          fi

          # Compose the comment payload based on the event type.
          if [ "$EVENT_NAME" = "release" ]; then
            if [ "$IS_PRERELEASE" = "true" ]; then
              HEADER="dev build \`$RELEASE_TAG\` cut"
            else
              HEADER="stable \`$RELEASE_TAG\` published"
            fi
            BODY=$(printf -- '- **Event:** %s\n- **Release:** [%s](%s)\n- **Timestamp:** %s\n' \
              "$HEADER" "$RELEASE_NAME" "$RELEASE_URL" "$(date -u +%Y-%m-%dT%H:%M:%SZ)")
          elif [ "$WF_RUN_NAME" = "Auto Rollover" ]; then
            HEADER="auto-rollover \`$WF_RUN_CONCLUSION\`"
            BODY=$(printf -- '- **Event:** %s\n- **Run:** %s\n- **Commit:** \`%s\`\n- **Timestamp:** %s\n' \
              "$HEADER" "$WF_RUN_URL" "$WF_RUN_HEAD_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)")
          elif [ "$WF_RUN_NAME" = "Test Signing" ]; then
            HEADER='signing regression detected'
            BODY=$(printf -- '- **Event:** %s (test-signing.yml)\n- **Run:** %s\n- **Timestamp:** %s\n\nSee [`Release pipeline signing regression`](../issues?q=is%%3Aissue+label%%3Aautomation%%3Arelease-events+in%%3Atitle+%%22signing+regression%%22) for the dedicated failure tracker.\n' \
              "$HEADER" "$WF_RUN_URL" "$(date -u +%Y-%m-%dT%H:%M:%SZ)")
          else
            echo "::notice::Unrecognised event shape; skipping post"
            exit 0
          fi

          gh issue comment "$ISSUE_NUMBER" --body "$BODY"

      # Final commit-status report (workflow_run path only -- the
      # ``release`` path has no single commit to attach to). Always runs
      # so a step failure above produces a visible red ❌ on the commit
      # row instead of disappearing into the Actions tab.
      - name: Report status (final)
        if: always() && github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          UPSTREAM: ${{ github.event.workflow_run.name }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "$JOB_STATUS" = "failure" ] || [ "$JOB_STATUS" = "cancelled" ]; then
            STATE=failure
            DESC="release-events ${JOB_STATUS} for ${UPSTREAM}"
          else
            STATE=success
            DESC="${UPSTREAM} event recorded"
          fi
          gh api -X POST "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" \
            -f state="$STATE" \
            -f context=release-events \
            -f description="$DESC" \
            -f target_url="$RUN_URL"
