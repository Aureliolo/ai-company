name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"

permissions: {}

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # renovate: datasource=github-releases depName=gitleaks/gitleaks
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install gitleaks
        run: |
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSLo "${ARCHIVE}" --retry 3 --retry-delay 5 "${BASE_URL}/${ARCHIVE}"
          curl -fsSLo checksums.txt --retry 3 --retry-delay 5 "${BASE_URL}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep " ${ARCHIVE}$" checksums.txt | sha256sum -c -
          tar xzf "${ARCHIVE}" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            gitleaks detect --source . -v --log-opts="origin/${BASE_REF}..HEAD"
          else
            gitleaks detect --source . -v
          fi

  report-failure:
    name: Open / update tracking issue on schedule failure
    needs: gitleaks
    # Only the schedule path gets the issue sink. Push runs already
    # surface as commit checks on main; PR runs surface as PR checks.
    if: >-
      always()
      && github.event_name == 'schedule'
      && needs.gitleaks.result != 'success'
      && needs.gitleaks.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Post / update tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.gitleaks.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE='Secret scan regression'
          ISSUE_NUMBER=$(gh issue list --state open --label 'automation:ci-health' \
            --search "in:title \"$TITLE\"" --json number,title \
            --jq '[.[] | select(.title == "'"$TITLE"'")] | .[0].number // empty')

          BODY=$(cat <<EOF
          Scheduled gitleaks scan failed at $(date -u +%Y-%m-%dT%H:%M:%SZ) with result \`$RESULT\`.

          Run: ${RUN_URL}

          Likely cause: a leaked secret was committed historically (the
          weekly schedule scans the full repo, unlike PR runs which only
          scan the diff), gitleaks released a new detector, or the
          gitleaks release-asset download flaked.
          EOF
          )

          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_URL=$(gh issue create --title "$TITLE" \
              --label 'automation:ci-health,type:ci,prio:high' \
              --body "$BODY")
            ISSUE_NUMBER="${ISSUE_URL##*/}"
            echo "Created tracking issue #$ISSUE_NUMBER"
          else
            gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          fi
