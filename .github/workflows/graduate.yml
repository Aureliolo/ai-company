name: Graduate

# One-click Release-As: trailer for target versions that skip the normal
# patch cadence (1.0 graduation, explicit minor jumps). Trigger via
# Actions -> Graduate -> Run workflow with the target version and a reason.
#
# Produces a signed empty commit on main via the Git Data API using the
# synthorg-release-bot App installation token. The commit carries a
# `Release-As: <target>` trailer so Release Please picks it up on its next
# run. Downgrades are hard-blocked (no `force` input, by design); fix-forward
# with a higher target if you need to recover.

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: "Full semver target version, e.g. `1.0.0`. No pre-release suffix -- use the normal flow for dev/rc."
        type: string
        required: true
      reason:
        description: "Why this target? Free-text justification; lands in the commit body."
        type: string
        required: true

permissions: {}

concurrency:
  group: graduate
  cancel-in-progress: false

jobs:
  graduate:
    name: Graduate to target version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Release runner setup
        id: setup
        uses: ./.github/actions/release-runner-setup
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          app-private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}

      - name: Validate target version
        id: validate
        env:
          TARGET: ${{ inputs.target_version }}
          REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail

          # Shape: three numeric components, no pre-release suffix. The
          # regular Release-Please flow handles dev / rc / alpha / beta.
          if ! [[ "$TARGET" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::target_version must match ^[0-9]+\.[0-9]+\.[0-9]+$ (got: $TARGET)"
            exit 1
          fi

          if [ -z "${REASON// /}" ]; then
            echo "::error::reason must be non-empty"
            exit 1
          fi
          # reason lands verbatim in the commit body. Reject control
          # characters so no newline/carriage-return injection can fake a
          # Git trailer. Reject trailer-shaped lines anywhere in the
          # value for belt-and-braces against post-sanitisation bypasses.
          if printf '%s' "$REASON" | grep -qE $'[\r\n\t]'; then
            echo "::error::reason must not contain newlines, carriage returns, or tabs"
            exit 1
          fi
          if printf '%s' "$REASON" | grep -qE '^[A-Z][A-Za-z-]+:'; then
            echo "::error::reason must not start with a Git-trailer-like token (e.g. 'Release-As:', 'Co-authored-by:')"
            exit 1
          fi

          # Last stable: strip pre-release tags and take the highest.
          LAST_STABLE=$(git tag --sort=-v:refname --list 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -vE '\-(dev|rc|alpha|beta)' | head -1 || true)
          if [ -z "$LAST_STABLE" ]; then
            echo "::error::no stable release tag found -- cannot determine baseline for downgrade check"
            exit 1
          fi
          LAST_VERSION="${LAST_STABLE#v}"
          echo "Last stable: $LAST_STABLE"
          echo "Target: $TARGET"

          # Numeric compare on each component -- hard-block downgrades and
          # same-version graduations (RP would reject the tag either way).
          IFS='.' read -r LMA LMI LPA <<< "$LAST_VERSION"
          IFS='.' read -r TMA TMI TPA <<< "$TARGET"
          higher=false
          if [ "$TMA" -gt "$LMA" ]; then higher=true
          elif [ "$TMA" -eq "$LMA" ]; then
            if [ "$TMI" -gt "$LMI" ]; then higher=true
            elif [ "$TMI" -eq "$LMI" ] && [ "$TPA" -gt "$LPA" ]; then higher=true
            fi
          fi
          if [ "$higher" != "true" ]; then
            echo "::error::target $TARGET is not strictly greater than last stable $LAST_STABLE. Downgrades are unsupported -- use a higher target to fix forward."
            exit 1
          fi

          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "last_stable=$LAST_STABLE" >> "$GITHUB_OUTPUT"

      - name: Create signed graduation commit on main
        id: commit
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          TARGET: ${{ steps.validate.outputs.target }}
          REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail

          PARENT_SHA=$(git rev-parse HEAD)
          TREE_SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$PARENT_SHA" --jq '.tree.sha')

          # Empty commit (reuses parent tree) via Git Data API. The App
          # token produces a GitHub-signed commit that verifies as
          # `{verified: true, reason: "valid"}` AND triggers downstream
          # release.yml + dev-release.yml workflows -- the single tool
          # that satisfies main's signed-commits rule and the recursion
          # carve-out together.
          COMMIT_MESSAGE=$(printf 'chore: graduate to v%s\n\n%s\n\nRelease-As: %s' \
            "$TARGET" "$REASON" "$TARGET")
          NEW_COMMIT=$(jq -n \
            --arg msg "$COMMIT_MESSAGE" \
            --arg tree "$TREE_SHA" \
            --arg parent "$PARENT_SHA" \
            '{message: $msg, tree: $tree, parents: [$parent]}' \
          | gh api --method POST "repos/$GITHUB_REPOSITORY/git/commits" --input - --jq '.sha')
          echo "Created commit: $NEW_COMMIT"

          gh api --method PATCH "repos/$GITHUB_REPOSITORY/git/refs/heads/main" \
            -f sha="$NEW_COMMIT"

          echo "commit_sha=$NEW_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Emit step summary
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          TARGET: ${{ steps.validate.outputs.target }}
          LAST_STABLE: ${{ steps.validate.outputs.last_stable }}
          COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
        run: |
          set -euo pipefail
          v=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$COMMIT_SHA" --jq '.verification')
          verified=$(jq -r '.verified' <<< "$v")
          reason_code=$(jq -r '.reason' <<< "$v")
          {
            echo "## Graduation"
            echo ""
            echo "- **From:** \`$LAST_STABLE\`"
            echo "- **To:** \`v$TARGET\`"
            echo "- **Commit:** \`$COMMIT_SHA\`"
            echo "- **Verification:** verified=\`$verified\` reason=\`$reason_code\`"
            echo ""
            echo "Release Please will pick up the \`Release-As: $TARGET\` trailer on its next run."
          } >> "$GITHUB_STEP_SUMMARY"
