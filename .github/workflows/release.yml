name: Release

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Belt-and-braces with the `on: push: branches: [main]` trigger.
      # Fails fast if the workflow is ever invoked from another ref (e.g. a
      # future `workflow_dispatch` addition or an unexpected routing event)
      # before the RELEASE_PLEASE_TOKEN is exposed via `env:`.
      - name: Validate trigger branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::release.yml must only run on refs/heads/main, got: $GITHUB_REF"
            exit 1
          fi

      # Draft releases don't create git tags, and force-tag-creation requires
      # release-please >= 17.2.0 (action v4.4.0 bundles 17.1.3).
      # Pre-create the tag so RP finds it. Remove once googleapis/release-please-action#1187 ships.
      - name: Ensure release tag exists
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          version=$(gh api "repos/${{ github.repository }}/contents/.github/.release-please-manifest.json" --jq '.content' | base64 -d | jq -r '."."')
          gh api "repos/${{ github.repository }}/git/ref/tags/v${version}" > /dev/null 2>&1 ||
            gh api "repos/${{ github.repository }}/git/refs" -f ref="refs/tags/v${version}" -f sha="${{ github.sha }}" > /dev/null

      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      # When Release Please creates/updates a release PR, update the BSL
      # Change Date to 3 years from today. The date update ships as part
      # of the release PR, so it goes through normal review + merge flow.
      - name: Checkout Release PR branch
        if: steps.release.outputs.pr != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: release-please--branches--main--components--synthorg
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Update BSL Change Date (release + 3 years)
        if: steps.release.outputs.pr != ''
        run: |
          new_date=$(LC_TIME=C date -d "+3 years" "+%B %-d, %Y")  # GNU date (ubuntu-latest)
          echo "Updating Change Date to: $new_date"
          sed -i "s/^Change Date:          .*/Change Date:          $new_date/" LICENSE
          grep -q "^Change Date:.*$new_date" LICENSE || { echo "ERROR: sed pattern did not match; Change Date was not updated"; exit 1; }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LICENSE
          git diff --cached --quiet && echo "Change Date already up to date" && exit 0
          git commit -m "chore: update BSL Change Date to $new_date"
          git push
