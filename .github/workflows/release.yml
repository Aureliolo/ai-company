name: Release

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Belt-and-braces with the `on: push: branches: [main]` trigger.
      # Fails fast if the workflow is ever invoked from another ref (e.g. a
      # future `workflow_dispatch` addition or an unexpected routing event)
      # before the RELEASE_PLEASE_TOKEN is exposed via `env:`.
      - name: Validate trigger branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::release.yml must only run on refs/heads/main, got: $GITHUB_REF"
            exit 1
          fi

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      # When Release Please creates/updates a release PR, update the BSL
      # Change Date to 3 years from today. The date update ships as part
      # of the release PR, so it goes through normal review + merge flow.
      - name: Checkout Release PR branch
        if: steps.release.outputs.pr != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: release-please--branches--main--components--synthorg
          persist-credentials: false

      - name: Update BSL Change Date (release + 3 years)
        if: steps.release.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          BRANCH: release-please--branches--main--components--synthorg
        run: |
          set -euo pipefail
          new_date=$(LC_TIME=C date -d "+3 years" "+%B %-d, %Y")  # GNU date (ubuntu-latest)
          echo "Updating Change Date to: $new_date"
          sed -i "s/^Change Date:          .*/Change Date:          $new_date/" LICENSE
          grep -q "^Change Date:.*$new_date" LICENSE || {
            echo "::error::sed pattern did not match; Change Date was not updated"
            exit 1
          }
          if git diff --quiet -- LICENSE; then
            echo "Change Date already up to date -- skipping commit"
            exit 0
          fi

          # Commit via the GitHub Contents API so the commit ships with a
          # GitHub-verified signature (branch protection requires signed
          # commits on main, and the squash-merge carries the trailer / body
          # metadata through to main regardless).
          BLOB_SHA=$(git rev-parse HEAD:LICENSE)
          jq -n \
            --arg msg "chore: update BSL Change Date to $new_date" \
            --arg content "$(base64 -w0 LICENSE)" \
            --arg sha "$BLOB_SHA" \
            --arg branch "$BRANCH" \
            '{message: $msg, content: $content, sha: $sha, branch: $branch}' \
          | gh api --method PUT "repos/$GITHUB_REPOSITORY/contents/LICENSE" --input -
