name: Python Audit

on:
  schedule:
    - cron: "0 2 * * 1"  # Weekly Monday 2am UTC
  workflow_dispatch:

permissions: {}

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv

      - name: pip-audit
        # Ignored vulnerabilities (revisit whenever upstream publishes a fix):
        # - GHSA-xqmj-j6mv-4862: litellm 1.83.0 is pinned by project decision;
        #   fix is in 1.83.7 but the pin is load-bearing for this repo.
        # - CVE-2026-3219: pip 26.0.1 vulnerability with no upstream fix
        #   version available yet. pip is a transitive of uv in this repo.
        run: |
          uv run pip-audit \
            --ignore-vuln GHSA-xqmj-j6mv-4862 \
            --ignore-vuln CVE-2026-3219

  report-failure:
    name: Open / update tracking issue on schedule failure
    needs: pip-audit
    # Only the schedule path gets the issue sink. Manual `workflow_dispatch`
    # failures from a debugging branch shouldn't open repo-wide CI-health
    # issues; the operator already sees the run output directly.
    if: >-
      always()
      && github.event_name == 'schedule'
      && needs.pip-audit.result != 'success'
      && needs.pip-audit.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read    # actions/checkout (to load .github/actions/post-tracking-issue)
      issues: write     # gh issue create / comment / pin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Compose body
        id: body
        env:
          RESULT: ${{ needs.pip-audit.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          {
            echo 'body<<TRACKING_ISSUE_BODY_EOF'
            cat <<EOF
          \`pip-audit\` failed at $(date -u +%Y-%m-%dT%H:%M:%SZ) with result \`$RESULT\`.

          Run: ${RUN_URL}

          Likely cause: a new CVE landed against a pinned dependency. Check
          the run log for the offending package + advisory ID, then either
          bump the dependency, add it to the \`--ignore-vuln\` list (with
          a comment explaining why), or accept the risk explicitly.
          EOF
            echo 'TRACKING_ISSUE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/post-tracking-issue
        with:
          title: 'Python audit regression'
          labels: 'automation:ci-health,type:ci,prio:high'
          body: ${{ steps.body.outputs.body }}
          pin: 'false'
          gh-token: ${{ github.token }}
