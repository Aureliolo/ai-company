name: Python Audit

on:
  schedule:
    - cron: "0 2 * * 1"  # Weekly Monday 2am UTC
  workflow_dispatch:

permissions: {}

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv

      - name: pip-audit
        # Ignored vulnerabilities (revisit whenever upstream publishes a fix):
        # - GHSA-xqmj-j6mv-4862: litellm 1.83.0 is pinned by project decision;
        #   fix is in 1.83.7 but the pin is load-bearing for this repo.
        # - CVE-2026-3219: pip 26.0.1 vulnerability with no upstream fix
        #   version available yet. pip is a transitive of uv in this repo.
        run: |
          uv run pip-audit \
            --ignore-vuln GHSA-xqmj-j6mv-4862 \
            --ignore-vuln CVE-2026-3219

  report-failure:
    name: Open / update tracking issue on schedule failure
    needs: pip-audit
    # Only the schedule path gets the issue sink. Manual `workflow_dispatch`
    # failures from a debugging branch shouldn't open repo-wide CI-health
    # issues; the operator already sees the run output directly.
    if: >-
      always()
      && github.event_name == 'schedule'
      && needs.pip-audit.result != 'success'
      && needs.pip-audit.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Post / update tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.pip-audit.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE='Python audit regression'
          # Search by title alone -- a label filter here would miss any
          # issue created via the label-less fallback (see below) and
          # cause the next run to open a duplicate tracker instead of
          # commenting on the existing one.
          ISSUE_NUMBER=$(gh issue list --state open \
            --search "in:title \"$TITLE\"" --json number,title \
            --jq '[.[] | select(.title == "'"$TITLE"'")] | .[0].number // empty')

          BODY=$(cat <<EOF
          \`pip-audit\` failed at $(date -u +%Y-%m-%dT%H:%M:%SZ) with result \`$RESULT\`.

          Run: ${RUN_URL}

          Likely cause: a new CVE landed against a pinned dependency. Check
          the run log for the offending package + advisory ID, then either
          bump the dependency, add it to the \`--ignore-vuln\` list (with
          a comment explaining why), or accept the risk explicitly.
          EOF
          )

          if [ -z "$ISSUE_NUMBER" ]; then
            if ! ISSUE_URL=$(gh issue create --title "$TITLE" \
                --label 'automation:ci-health,type:ci,prio:high' \
                --body "$BODY" 2>&1); then
              echo "::warning::labeled issue create failed: $ISSUE_URL -- retrying without labels"
              ISSUE_URL=$(gh issue create --title "$TITLE" --body "$BODY")
            fi
            ISSUE_NUMBER="${ISSUE_URL##*/}"
            echo "Created tracking issue #$ISSUE_NUMBER"
          else
            gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          fi
