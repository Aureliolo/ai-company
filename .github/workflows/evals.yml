name: Agent Evaluations

on:
  schedule:
    - cron: "0 2 * * *" # nightly at 2 AM UTC
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: agent-evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-evals:
    name: Run Agent Evaluation Suite
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-evals')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-python-uv

      - name: Run agent evaluations
        run: >-
          uv run python -m pytest tests/evals/
          -n 8
          --run-agent-evals
          --eval-timeout=300
          -v
          --tb=short

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-results-${{ github.run_id }}
          path: tests/evals/results/
          if-no-files-found: ignore
          retention-days: 30

  report-failure:
    name: Open / update tracking issue on schedule failure
    needs: agent-evals
    # Only the schedule path gets the issue sink. PR runs already surface
    # as PR checks; manual workflow_dispatch is visible to the triggerer.
    if: >-
      always()
      && github.event_name == 'schedule'
      && needs.agent-evals.result != 'success'
      && needs.agent-evals.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Compose body
        id: body
        env:
          RESULT: ${{ needs.agent-evals.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          {
            echo 'body<<TRACKING_ISSUE_BODY_EOF'
            cat <<EOF
          Scheduled agent-evals run failed at $(date -u +%Y-%m-%dT%H:%M:%SZ) with result \`$RESULT\`.

          Run: ${RUN_URL}

          Likely cause: prompt regression, provider drift, or eval
          harness change. Inspect the eval-results artifact attached to
          the run for the per-test breakdown.
          EOF
            echo 'TRACKING_ISSUE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/post-tracking-issue
        with:
          title: 'Agent eval regression'
          labels: 'automation:ci-health,type:ci,prio:medium'
          body: ${{ steps.body.outputs.body }}
          pin: 'false'
          gh-token: ${{ github.token }}
