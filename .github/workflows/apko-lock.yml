name: Update apko lockfiles

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  update-lockfiles:
    name: apko lock --update
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up apko
        env:
          # renovate: datasource=github-releases depName=chainguard-dev/apko
          APKO_VERSION: v1.2.3
        run: |
          curl -fsSL --retry 3 --retry-delay 5 "https://github.com/chainguard-dev/apko/releases/download/${APKO_VERSION}/apko_${APKO_VERSION#v}_linux_amd64.tar.gz" -o /tmp/apko.tar.gz
          curl -fsSL --retry 3 --retry-delay 5 "https://github.com/chainguard-dev/apko/releases/download/${APKO_VERSION}/checksums.txt" -o /tmp/apko-checksums.txt
          grep "apko_${APKO_VERSION#v}_linux_amd64.tar.gz" /tmp/apko-checksums.txt | (cd /tmp && sha256sum -c -)
          tar -xzf /tmp/apko.tar.gz -C /usr/local/bin apko
          rm -f /tmp/apko.tar.gz /tmp/apko-checksums.txt

      - name: Update lockfiles
        run: |
          for config in docker/backend/apko.yaml docker/sandbox/apko.yaml; do
            echo "Updating lockfile for ${config}..."
            apko lock --update "${config}"
          done

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- 'docker/*/apko.lock.json'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "ci: update apko lockfiles"
          title: "ci: update apko lockfiles"
          body: |
            Automated weekly update of apko lockfiles via `.github/workflows/apko-lock.yml`.

            Wolfi package digests and transitive dependencies have been refreshed.
          branch: ci/apko-lock-update
          labels: |
            dependencies
            type:ci
            scope:docker
          reviewers: Aureliolo
