name: Update apko lockfiles

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  update-lockfiles:
    name: apko lock --update
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Environment `apko-lock` carries a `main`-only branch allowlist so the
    # schedule-triggered write permissions (contents:write + pull-requests:write)
    # are gated on the deployment ref being main. Configured via
    # scripts/configure_environments.sh (see docs/reference/github-environments.md).
    environment: apko-lock
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up apko
        uses: ./.github/actions/setup-apko
        with:
          # renovate: datasource=github-releases depName=chainguard-dev/apko
          version: v1.2.7

      - name: Update lockfiles
        run: |
          for config in docker/*/apko.yaml; do
            echo "Updating lockfile for ${config}..."
            apko lock --update "${config}"
          done

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- 'docker/*/apko.lock.json'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "ci: update apko lockfiles"
          # Route the commit through the Contents API so it is signed
          # by GitHub (keeps the PR free of Unverified badges and
          # matches the signature pattern used elsewhere in CI).
          sign-commits: true
          title: "ci: update apko lockfiles"
          body: |
            Automated weekly update of apko lockfiles via `.github/workflows/apko-lock.yml`.

            Wolfi package digests and transitive dependencies have been refreshed.
          branch: ci/apko-lock-update
          labels: |
            dependencies
            type:ci
            scope:docker
          reviewers: Aureliolo

  report-failure:
    name: Open / update tracking issue on schedule failure
    needs: update-lockfiles
    # Only the schedule path gets the issue sink. Manual `workflow_dispatch`
    # failures from a debugging branch shouldn't open repo-wide CI-health
    # issues; the operator already sees the run output directly.
    if: >-
      always()
      && github.event_name == 'schedule'
      && needs.update-lockfiles.result != 'success'
      && needs.update-lockfiles.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Post / update tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.update-lockfiles.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE='apko lockfile update regression'
          # Search by title alone -- a label filter here would miss any
          # issue created via the label-less fallback (see below) and
          # cause the next run to open a duplicate tracker instead of
          # commenting on the existing one.
          ISSUE_NUMBER=$(gh issue list --state open \
            --search "in:title \"$TITLE\"" --json number,title \
            --jq '[.[] | select(.title == "'"$TITLE"'")] | .[0].number // empty')

          BODY=$(cat <<EOF
          \`apko lock --update\` workflow failed at $(date -u +%Y-%m-%dT%H:%M:%SZ) with result \`$RESULT\`.

          Run: ${RUN_URL}

          Likely cause: a Wolfi package was renamed/removed, an apko CLI
          breaking change, or the \`peter-evans/create-pull-request\`
          action could not push (App token / branch protection drift).
          When this stays red for >1 weekly cycle, base images go stale.
          EOF
          )

          if [ -z "$ISSUE_NUMBER" ]; then
            # If a referenced label is missing, gh exits non-zero and the
            # whole sink would be swallowed. Fall back to a label-less
            # create so the failure still surfaces, with a warning logged.
            if ! ISSUE_URL=$(gh issue create --title "$TITLE" \
                --label 'automation:ci-health,type:ci,prio:medium' \
                --body "$BODY" 2>&1); then
              echo "::warning::labeled issue create failed: $ISSUE_URL -- retrying without labels"
              ISSUE_URL=$(gh issue create --title "$TITLE" --body "$BODY")
            fi
            ISSUE_NUMBER="${ISSUE_URL##*/}"
            echo "Created tracking issue #$ISSUE_NUMBER"
          else
            gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          fi
