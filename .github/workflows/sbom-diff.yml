name: SBOM Diff

# Inform-only sticky PR comment on Release Please release PRs. Compares the
# backend SBOM generated by the current PR's docker.yml run against the
# sbom-backend.cdx.json attached to the last stable release's assets.
#
# License enforcement is NOT this workflow's job -- that lives in
# dependency-review.yml. This comment is advisory, meant to give reviewers
# a human-readable dep-change summary at a glance before merging the
# release PR. On a red dependency-review (restrictive license, known
# vulnerability), this workflow still comments -- the banner at the top
# of the comment steers reviewers to dependency-review for the hard gate.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Release Please opens PRs on this deterministic branch pattern.
    branches: [main]

permissions: {}

concurrency:
  group: sbom-diff-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diff:
    name: SBOM diff
    # Only run on the Release Please release PR. Regular feature PRs do
    # not trigger a dep-change summary.
    if: >-
      startsWith(github.event.pull_request.head.ref, 'release-please--branches--main--components--synthorg')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
      actions: read
      contents: read
    steps:
      - name: Locate head-run SBOM artifact
        id: head
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # docker.yml emits `sbom-backend` as an artifact on every build.
          RUN_ID=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow docker.yml \
            --commit "$HEAD_SHA" --limit 1 --json databaseId --jq '.[0].databaseId // ""')
          if [ -z "$RUN_ID" ]; then
            echo "::notice::docker.yml has not produced a run for $HEAD_SHA yet; skipping SBOM diff"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Even if the run exists, the ``sbom-backend`` artifact may be
          # missing (still uploading, a build branch that skipped the
          # SBOM step, artifact expired, ...). Confirm the artifact is
          # present before asking actions/download-artifact to fetch it;
          # the action otherwise hard-fails the job with an opaque
          # "artifact not found" error that degrades the inform-only
          # SBOM-diff comment into a blocking failure.
          ARTIFACT_COUNT=$(gh api \
            "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/artifacts" \
            --jq '[.artifacts[] | select(.name == "sbom-backend" and .expired == false)] | length' \
            2>/dev/null || echo 0)
          if [ "${ARTIFACT_COUNT:-0}" = "0" ]; then
            echo "::notice::sbom-backend artifact not available on run $RUN_ID (still uploading, skipped, or expired); skipping SBOM diff"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "head_run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Download head SBOM
        if: steps.head.outputs.skip != 'true'
        # Artifact presence was confirmed in the step above, but keep
        # the download non-blocking in case the artifact expires between
        # the check and the fetch (expiry is a GitHub-side race we
        # cannot rule out). The inform-only SBOM diff is a nice-to-have,
        # not a release gate.
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom-backend
          path: head-sbom
          run-id: ${{ steps.head.outputs.head_run_id }}
          github-token: ${{ github.token }}

      - name: Download last-stable SBOM
        if: steps.head.outputs.skip != 'true'
        id: base
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          LAST_STABLE=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq '.tag_name // ""')
          if [ -z "$LAST_STABLE" ]; then
            echo "::notice::No stable release found; cannot produce diff"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p base-sbom
          if ! gh release download "$LAST_STABLE" --repo "$GITHUB_REPOSITORY" \
              --pattern 'sbom-backend.cdx.json' --dir base-sbom; then
            echo "::notice::No sbom-backend.cdx.json on $LAST_STABLE -- cannot diff"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "last_stable=$LAST_STABLE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Compute + post diff
        if: steps.head.outputs.skip != 'true' && steps.base.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LAST_STABLE: ${{ steps.base.outputs.last_stable }}
        run: |
          set -euo pipefail

          # Extract (name, version, license) tuples from each SBOM. The
          # CycloneDX 1.x JSON shape is `.components[]` with `.name`,
          # `.version`, `.licenses[].license.id` (SPDX id) or `.expression`.
          extract() {
            jq -r '
              .components[]? |
              [.name, .version,
               (if (.licenses | length // 0) > 0 then
                  ([.licenses[] | .license.id // .expression // "unknown"]
                    | map(select(. != "" and . != null))
                    | (if length > 0 then join("|") else "unknown" end))
                else "unknown" end)
              ] | @tsv' "$1" | sort -u
          }

          extract head-sbom/sbom-backend.cdx.json > head.tsv
          extract base-sbom/sbom-backend.cdx.json > base.tsv

          ADDED=$(comm -23 head.tsv base.tsv || true)
          REMOVED=$(comm -13 head.tsv base.tsv || true)

          # Count license categories on the head SBOM for a summary row.
          categorise() {
            awk -F'\t' '{ split($3, lics, "|"); for (l in lics) print lics[l] }' "$1" \
              | sort -u | awk 'BEGIN{p=0;w=0;o=0}
                /^(MIT|Apache-2.0|BSD-3-Clause|BSD-2-Clause|ISC|0BSD|Zlib|Python-2.0|PSF-2.0|CC0-1.0|Unlicense)$/ {p++; next}
                /^(MPL-2.0|LGPL-.*|EPL-.*)$/ {w++; next}
                /./ {o++}
                END{printf "permissive=%d weak-copyleft=%d other=%d", p, w, o}'
          }
          LICENSE_COUNTS=$(categorise head.tsv)

          build_table() {
            local content="$1"
            if [ -z "$content" ]; then
              echo "_(none)_"
              return
            fi
            printf '| Package | Version | License |\n| --- | --- | --- |\n'
            printf '%s\n' "$content" | awk -F'\t' '{printf "| `%s` | `%s` | `%s` |\n", $1, $2, $3}'
          }

          COMMENT=$(cat <<EOF
          <!-- sbom-diff:backend -->
          ## SBOM diff for \`ghcr.io/aureliolo/synthorg-backend\`

          **Baseline:** \`$LAST_STABLE\`
          **License breakdown (head):** \`$LICENSE_COUNTS\`

          > Advisory summary -- license enforcement happens in [\`dependency-review.yml\`](../actions/workflows/dependency-review.yml); this comment does not gate merge.

          ### Added components
          $(build_table "$ADDED")

          ### Removed components
          $(build_table "$REMOVED")
          EOF
          )

          # Sticky comment via the hidden marker at the top of the body.
          EXISTING=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --paginate \
            --jq 'map(select(.body | startswith("<!-- sbom-diff:backend -->"))) | .[0].id // empty')
          if [ -n "$EXISTING" ]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$EXISTING" \
              -f body="$COMMENT" >/dev/null
          else
            gh issue comment "$PR_NUMBER" --body "$COMMENT"
          fi
