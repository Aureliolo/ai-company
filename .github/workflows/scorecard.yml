name: Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"  # Weekly Monday 4am UTC
  workflow_dispatch:

permissions: {}

jobs:
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif

  report-failure:
    name: Open / update tracking issue on schedule failure
    needs: scorecard
    # Only the schedule path gets the issue sink. Push runs already
    # surface as commit checks on main; workflow_dispatch is visible to
    # the triggerer.
    if: >-
      always()
      && github.event_name == 'schedule'
      && needs.scorecard.result != 'success'
      && needs.scorecard.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Post / update tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.scorecard.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE='Scorecard scan regression'
          # Search by title alone -- a label filter here would miss any
          # issue created via the label-less fallback (see below) and
          # cause the next run to open a duplicate tracker instead of
          # commenting on the existing one.
          ISSUE_NUMBER=$(gh issue list --state open \
            --search "in:title \"$TITLE\"" --json number,title \
            --jq '[.[] | select(.title == "'"$TITLE"'")] | .[0].number // empty')

          BODY=$(cat <<EOF
          Scheduled OSSF Scorecard scan failed at $(date -u +%Y-%m-%dT%H:%M:%SZ) with result \`$RESULT\`.

          Run: ${RUN_URL}

          Likely cause: scorecard-action upgrade, OSSF endpoint outage,
          or repo-side permissions drift. The push-triggered run on the
          next merge to main will independently re-surface this if the
          underlying issue persists.
          EOF
          )

          if [ -z "$ISSUE_NUMBER" ]; then
            if ! ISSUE_URL=$(gh issue create --title "$TITLE" \
                --label 'automation:ci-health,type:ci,prio:low' \
                --body "$BODY" 2>&1); then
              echo "::warning::labeled issue create failed: $ISSUE_URL -- retrying without labels"
              ISSUE_URL=$(gh issue create --title "$TITLE" --body "$BODY")
            fi
            ISSUE_NUMBER="${ISSUE_URL##*/}"
            echo "Created tracking issue #$ISSUE_NUMBER"
          else
            gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          fi
