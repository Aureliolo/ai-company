name: Auto Rollover

# Preserve the 0.X.9 -> 0.(X+1).0 versioning pattern under `always-bump-patch`.
# When the last stable tag is 0.X.9, the next patch bump would be 0.X.10.
# This workflow detects that case and creates an empty commit with a
# `Release-As: 0.(X+1).0` trailer so Release-Please opens a PR for the minor
# bump instead. No manual Release-As trailers needed for routine rollovers.

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: auto-rollover
  cancel-in-progress: false

jobs:
  rollover:
    name: Check Rollover
    # Skip on Release Please release commits and on commits that already
    # carry a Release-As trailer (including our own rollover commits).
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(main): release')
      && !contains(github.event.head_commit.message, 'Release-As:')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: release
    permissions:
      contents: write
      pull-requests: read
    steps:
      # Belt-and-braces with the `on: push: branches: [main]` trigger.
      - name: Validate trigger branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::auto-rollover.yml must only run on refs/heads/main, got: $GITHUB_REF"
            exit 1
          fi

      # Mint installation token for the `synthorg-release-bot` App. The
      # rollover commit is pushed directly to main, which enforces signed
      # commits via branch protection. App-token-authored Git Data API
      # commits are GitHub-signed (`verified: true, reason: "valid"`) AND
      # trigger downstream Release + Dev Release workflows -- the two
      # constraints PAT + GITHUB_TOKEN could not satisfy together.
      # A missing RELEASE_BOT_APP_ID / RELEASE_BOT_APP_PRIVATE_KEY secret
      # fails this step fast with an informative error, so we no longer
      # need the prior "Validate token" preflight.
      - name: Mint release-bot App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: synthorg

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check if rollover is needed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          LAST_STABLE=$(git tag --sort=-v:refname --list 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -vE '\-(dev|rc|alpha|beta)' | head -1 || true)
          if [ -z "$LAST_STABLE" ]; then
            echo "No stable tag found; skipping rollover."
            echo "needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Last stable tag: $LAST_STABLE"

          VERSION="${LAST_STABLE#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Roll over whenever patch >= 9 (next bump would reach or exceed .10).
          # Defensive: the typical trigger is patch == 9, but this also recovers
          # if a 0.X.10+ tag somehow slipped through.
          if [ "$PATCH" -lt 9 ]; then
            echo "Last stable patch is $PATCH; no rollover needed."
            echo "needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip if a Release-As trailer is already queued between last stable and HEAD.
          # Handles both our own rollover commits and manual overrides (feature-PR
          # body Release-As trailers land here via squash-merge).
          if git log "${LAST_STABLE}..HEAD" --format=%B | grep -qE '^Release-As:'; then
            echo "Release-As trailer already present in unreleased commits; skipping."
            echo "needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Also skip if Release Please already has an open release PR whose
          # body carries a Release-As trailer. That directive isn't in git
          # history until the RP PR merges, so without this check the rollover
          # could race ahead and push a conflicting 0.(X+1).0 target.
          RP_PR_BODY=$(gh pr list --state open --label 'autorelease: pending' \
            --json body --jq '.[0].body // ""')
          if printf '%s' "$RP_PR_BODY" | grep -qE '^Release-As:'; then
            echo "Release-As trailer already queued in Release Please PR body; skipping."
            echo "needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0"
          echo "Rollover target: $NEXT_VERSION"
          echo "needed=true" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create rollover commit
        if: steps.check.outputs.needed == 'true'
        env:
          # App installation token (not GITHUB_TOKEN) so the resulting
          # commit triggers downstream release.yml + dev-release.yml
          # workflows (GITHUB_TOKEN-authored commits are suppressed by
          # GitHub's anti-recursion rule, which does not apply to App
          # tokens). Git Data API commits from an App token are signed
          # with GitHub's internal key, attributed to the App's bot
          # identity, and verify as `{verified: true, reason: "valid"}`.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEXT_VERSION: ${{ steps.check.outputs.next_version }}
        run: |
          set -euo pipefail
          PARENT_SHA=$(git rev-parse HEAD)
          TREE_SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$PARENT_SHA" --jq '.tree.sha')

          # Create an empty commit (reuses the parent's tree) via the Git
          # Data API so the commit ships with a verified signature, then
          # fast-forward main to it.
          COMMIT_MESSAGE=$(printf 'chore: auto-rollover to v%s\n\nRelease-As: %s' "$NEXT_VERSION" "$NEXT_VERSION")
          NEW_COMMIT=$(jq -n \
            --arg msg "$COMMIT_MESSAGE" \
            --arg tree "$TREE_SHA" \
            --arg parent "$PARENT_SHA" \
            '{message: $msg, tree: $tree, parents: [$parent]}' \
          | gh api --method POST "repos/$GITHUB_REPOSITORY/git/commits" --input - --jq '.sha')
          echo "Created commit: $NEW_COMMIT"

          gh api --method PATCH "repos/$GITHUB_REPOSITORY/git/refs/heads/main" \
            -f sha="$NEW_COMMIT"
