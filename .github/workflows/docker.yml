name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "docker/**"
      - "web/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
      - ".github/actions/build-apko-base/**"
      - ".github/actions/build-scan-image/**"
      - ".github/actions/cis-scan/**"
      - ".github/actions/publish-image/**"
      - ".github/actions/setup-apko/**"
      - ".github/actions/setup-python-uv/**"
      - "scripts/cis-scan.sh"
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/export_openapi.py"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # renovate: datasource=github-releases depName=aquasecurity/trivy
  TRIVY_VERSION: "0.70.0"

jobs:
  # Detect which domains changed so docs-only PRs skip backend/sandbox builds
  changes:
    name: Detect Docker Changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      sandbox: ${{ steps.filter.outputs.sandbox }}
      sidecar: ${{ steps.filter.outputs.sidecar }}
      fine-tune: ${{ steps.filter.outputs.fine-tune }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'docker/backend/**'
              - 'src/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.dockerignore'
              - '.github/workflows/docker.yml'
              - '.github/actions/build-apko-base/**'
              - '.github/actions/build-scan-image/**'
              - '.github/actions/cis-scan/**'
              - '.github/actions/publish-image/**'
              - '.github/actions/setup-apko/**'
              - 'scripts/cis-scan.sh'
            sandbox:
              - 'docker/sandbox/**'
              - '.dockerignore'
              - '.github/workflows/docker.yml'
              - '.github/actions/build-apko-base/**'
              - '.github/actions/build-scan-image/**'
              - '.github/actions/cis-scan/**'
              - '.github/actions/publish-image/**'
              - '.github/actions/setup-apko/**'
              - 'scripts/cis-scan.sh'
            sidecar:
              - 'docker/sidecar/**'
              - '.dockerignore'
              - '.github/workflows/docker.yml'
              - '.github/actions/build-apko-base/**'
              - '.github/actions/build-scan-image/**'
              - '.github/actions/cis-scan/**'
              - '.github/actions/publish-image/**'
              - '.github/actions/setup-apko/**'
              - 'scripts/cis-scan.sh'
            fine-tune:
              - 'docker/fine-tune/**'
              - 'src/synthorg/memory/embedding/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.dockerignore'
              - '.github/workflows/docker.yml'
              - '.github/actions/build-apko-base/**'
              - '.github/actions/build-scan-image/**'
              - '.github/actions/cis-scan/**'
              - '.github/actions/publish-image/**'
              - '.github/actions/setup-apko/**'
              - 'scripts/cis-scan.sh'
            web:
              - 'docker/web/**'
              - 'web/**'
              - 'docs/**'
              - 'mkdocs.yml'
              - 'scripts/export_openapi.py'
              - 'src/synthorg/api/**'
              - '.github/workflows/docker.yml'
              - '.github/actions/build-apko-base/**'
              - '.github/actions/cis-scan/**'
              - '.github/actions/setup-apko/**'
              - '.github/actions/setup-python-uv/**'
              - 'scripts/cis-scan.sh'

  # Extract app version from pyproject.toml (single source of truth)
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      deployment_env: ${{ steps.deployment-env.outputs.deployment_env }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "
          import tomllib
          import sys
          try:
              with open('pyproject.toml', 'rb') as f:
                  data = tomllib.load(f)
              print(data['tool']['commitizen']['version'])
          except (KeyError, FileNotFoundError) as e:
              print(f'::error::Failed to extract version: {e}', file=sys.stderr)
              sys.exit(1)
          ")
          echo "app_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "App version: ${VERSION}"

      # Resolve the deployment environment baked into backend images
      # built by this run. Ties into the existing version-label logic:
      # final release tags (e.g. v0.7.0) -> "prod"; every other tagged
      # pre-release form (-dev.N, -rc.N, -alpha.N, -beta.N) -> "pre-release";
      # everything else (main pushes, PR builds, workflow_dispatch manual
      # runs, and any local `docker build` without --build-arg) -> "dev".
      # The backend Dockerfile reads this as a build-arg and bakes it
      # into SYNTHORG_TELEMETRY_ENV_BAKED, which
      # synthorg.telemetry.collector._resolve_environment picks up as
      # the fallback tag when no operator override or CI auto-detection
      # applies.
      - name: Resolve baked deployment environment
        id: deployment-env
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            case "${GITHUB_REF}" in
              *-dev.*|*-rc.*|*-alpha.*|*-beta.*)
                ENV_TAG="pre-release"
                ;;
              *)
                ENV_TAG="prod"
                ;;
            esac
          else
            ENV_TAG="dev"
          fi
          echo "deployment_env=${ENV_TAG}" >> "$GITHUB_OUTPUT"
          echo "Deployment env (baked into backend image): ${ENV_TAG}"

  # =========================================================================
  # Compose file validation -- catches syntax errors early
  # =========================================================================
  validate-compose:
    name: Validate Compose Files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Validate compose files
        run: |
          echo "POSTGRES_PASSWORD=ci-validation-dummy" > docker/.env
          docker compose -f docker/compose.yml config --quiet
          docker compose -f docker/compose.yml -f docker/compose.distributed.yml --profile distributed config --quiet
          docker compose -f docker/compose.yml -f docker/compose.override.yml config --quiet

      - name: Report tmpfs allocations
        run: |
          echo "## tmpfs Allocations" >> "$GITHUB_STEP_SUMMARY"
          for f in docker/compose.yml docker/compose.distributed.yml docker/compose.override.yml; do
            echo "### $f" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E 'tmpfs:|^\s+- /.*size=' "$f" >> "$GITHUB_STEP_SUMMARY" || echo "_none_" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          done

  # =========================================================================
  # apko base images -- Wolfi-composed bases (all use build-apko-base action)
  # =========================================================================
  # The build-*-base jobs run on every event (PR, push, tag). They only need
  # `security-events: write` to upload Trivy SARIF results. The companion
  # build-*-base-publish jobs run on non-PR events and carry the elevated
  # permissions needed to push, sign, and attest the image.
  build-backend-base:
    name: Build Backend Base (apko)
    needs: [version, changes, validate-compose]
    if: >-
      !cancelled() && needs.version.result == 'success' &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.backend == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    outputs:
      tag: ${{ steps.build.outputs.tag }}
      artifact-name: ${{ steps.build.outputs.artifact-name }}
      tarball-name: ${{ steps.build.outputs.tarball-name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: build
        uses: ./.github/actions/build-apko-base
        with:
          image-name: backend
          apko-yaml: docker/backend/apko.yaml
          trivy-version: ${{ env.TRIVY_VERSION }}

  build-backend-base-publish:
    name: Publish Backend Base (apko)
    needs: [version, build-backend-base]
    # Restricted to main pushes and v-tags: `github.event_name != 'pull_request'`
    # alone would also admit workflow_dispatch from an arbitrary feature branch,
    # letting unmerged code push, sign, and attest base images.
    if: >-
      !cancelled() &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
      needs.build-backend-base.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: image-push
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.publish.outputs.digest }}
      tag: ${{ steps.publish.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: publish
        uses: ./.github/actions/publish-apko-base
        with:
          image-name: backend
          tag: ${{ needs.build-backend-base.outputs.tag }}
          artifact-name: ${{ needs.build-backend-base.outputs.artifact-name }}
          tarball-name: ${{ needs.build-backend-base.outputs.tarball-name }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

  build-sandbox-base:
    name: Build Sandbox Base (apko)
    needs: [version, changes, validate-compose]
    if: >-
      !cancelled() && needs.version.result == 'success' &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.sandbox == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    outputs:
      tag: ${{ steps.build.outputs.tag }}
      artifact-name: ${{ steps.build.outputs.artifact-name }}
      tarball-name: ${{ steps.build.outputs.tarball-name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: build
        uses: ./.github/actions/build-apko-base
        with:
          image-name: sandbox
          apko-yaml: docker/sandbox/apko.yaml
          trivy-version: ${{ env.TRIVY_VERSION }}

  build-sandbox-base-publish:
    name: Publish Sandbox Base (apko)
    needs: [version, build-sandbox-base]
    if: >-
      !cancelled() &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
      needs.build-sandbox-base.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: image-push
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.publish.outputs.digest }}
      tag: ${{ steps.publish.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: publish
        uses: ./.github/actions/publish-apko-base
        with:
          image-name: sandbox
          tag: ${{ needs.build-sandbox-base.outputs.tag }}
          artifact-name: ${{ needs.build-sandbox-base.outputs.artifact-name }}
          tarball-name: ${{ needs.build-sandbox-base.outputs.tarball-name }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

  build-sidecar-base:
    name: Build Sidecar Base (apko)
    needs: [version, changes, validate-compose]
    if: >-
      !cancelled() && needs.version.result == 'success' &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.sidecar == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    outputs:
      tag: ${{ steps.build.outputs.tag }}
      artifact-name: ${{ steps.build.outputs.artifact-name }}
      tarball-name: ${{ steps.build.outputs.tarball-name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: build
        uses: ./.github/actions/build-apko-base
        with:
          image-name: sidecar
          apko-yaml: docker/sidecar/apko.yaml
          trivy-version: ${{ env.TRIVY_VERSION }}

  build-sidecar-base-publish:
    name: Publish Sidecar Base (apko)
    needs: [version, build-sidecar-base]
    if: >-
      !cancelled() &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
      needs.build-sidecar-base.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: image-push
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.publish.outputs.digest }}
      tag: ${{ steps.publish.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: publish
        uses: ./.github/actions/publish-apko-base
        with:
          image-name: sidecar
          tag: ${{ needs.build-sidecar-base.outputs.tag }}
          artifact-name: ${{ needs.build-sidecar-base.outputs.artifact-name }}
          tarball-name: ${{ needs.build-sidecar-base.outputs.tarball-name }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

  build-fine-tune-base:
    name: Build Fine-Tune Base (apko)
    needs: [version, changes, validate-compose]
    if: >-
      !cancelled() && needs.version.result == 'success' &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.fine-tune == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    outputs:
      tag: ${{ steps.build.outputs.tag }}
      artifact-name: ${{ steps.build.outputs.artifact-name }}
      tarball-name: ${{ steps.build.outputs.tarball-name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: build
        uses: ./.github/actions/build-apko-base
        with:
          image-name: fine-tune
          apko-yaml: docker/fine-tune/apko.yaml
          trivy-version: ${{ env.TRIVY_VERSION }}

  build-fine-tune-base-publish:
    name: Publish Fine-Tune Base (apko)
    needs: [version, build-fine-tune-base]
    if: >-
      !cancelled() &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
      needs.build-fine-tune-base.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: image-push
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.publish.outputs.digest }}
      tag: ${{ steps.publish.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: publish
        uses: ./.github/actions/publish-apko-base
        with:
          image-name: fine-tune
          tag: ${{ needs.build-fine-tune-base.outputs.tag }}
          artifact-name: ${{ needs.build-fine-tune-base.outputs.artifact-name }}
          tarball-name: ${{ needs.build-fine-tune-base.outputs.tarball-name }}
          architectures: "amd64"
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # Application images -- thin Dockerfile wrappers over apko bases
  # =========================================================================
  build-backend:
    name: Build Backend
    needs: [version, build-backend-base, build-backend-base-publish]
    # On PR events publish is always skipped (guarded to main / v* tags), so
    # the app build falls back to the locally-loaded scan artifact. On any
    # non-PR event we require publish to have succeeded -- this makes
    # workflow_dispatch from a feature branch skip the app build entirely
    # instead of trying to pull a base tag that was never pushed to GHCR.
    if: >-
      !cancelled() &&
      needs.version.result == 'success' &&
      needs.build-backend-base.result == 'success' &&
      (github.event_name == 'pull_request' || needs.build-backend-base-publish.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Build and scan backend image
        uses: ./.github/actions/build-scan-image
        with:
          image-name: backend
          display-name: Backend
          dockerfile: docker/backend/Dockerfile
          app-version: ${{ needs.version.outputs.app_version }}
          base-image-repo: ghcr.io/aureliolo/synthorg-backend-base
          base-image-tag: ${{ needs.build-backend-base.outputs.tag }}
          base-image-digest: ${{ needs.build-backend-base-publish.outputs.digest }}
          base-image-artifact-name: ${{ needs.build-backend-base.outputs.artifact-name }}
          base-image-tarball-name: ${{ needs.build-backend-base.outputs.tarball-name }}
          extra-build-args: |
            DEPLOYMENT_ENV=${{ needs.version.outputs.deployment_env }}

  build-backend-publish:
    name: Publish Backend
    needs: [version, build-backend]
    if: >-
      !cancelled() &&
      needs.build-backend.result == 'success' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: image-push
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.publish.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Publish backend image
        id: publish
        uses: ./.github/actions/publish-image
        with:
          image-name: backend
          app-version: ${{ needs.version.outputs.app_version }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # Web image -- melange-packaged assets + pure apko (no Dockerfile)
  # =========================================================================
  build-web-assets:
    name: Build Web Assets (melange)
    needs: [version, changes, validate-compose]
    if: >-
      !cancelled() && needs.version.result == 'success' &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.web == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.15.0"
          package-manager-cache: false

      - name: Set up Python + uv (OpenAPI export + docs build)
        uses: ./.github/actions/setup-python-uv

      - name: Export OpenAPI schema (required by frontend codegen)
        run: uv run python scripts/export_openapi.py

      - name: Install frontend deps and build SPA
        working-directory: web
        run: npm ci --ignore-scripts && npm run build

      # D2 does not publish checksums or signatures in its releases --
      # integrity relies on HTTPS transport from GitHub. Accepted tradeoff:
      # D2 is a docs-only diagramming tool (not a security scanner).
      # Version managed by Renovate (regex manager in renovate.json).
      - name: Install D2
        env:
          # renovate: datasource=github-releases depName=terrastruct/d2
          D2_VERSION: v0.7.1
        run: |
          curl -fsSL --retry 3 --retry-delay 5 "https://github.com/terrastruct/d2/releases/download/${D2_VERSION}/d2-${D2_VERSION}-linux-amd64.tar.gz" -o /tmp/d2.tar.gz
          tar -xzf /tmp/d2.tar.gz -C /tmp
          sudo mv "/tmp/d2-${D2_VERSION}/bin/d2" /usr/local/bin/d2
          rm -rf /tmp/d2.tar.gz "/tmp/d2-${D2_VERSION}"

      - name: Build documentation
        env:
          PYTHONPATH: .
        run: uv run zensical build

      - name: Set up melange
        uses: chainguard-dev/actions/setup-melange@061bc0e921116bde1470f51fb5c86d5318f16558 # v1.6.15

      - name: Generate melange signing key
        run: melange keygen

      - name: Build web-assets apk
        env:
          APP_VERSION: ${{ needs.version.outputs.app_version }}
        run: |
          printf 'version: %s\n' "$APP_VERSION" > /tmp/melange-vars.yaml
          # Build arches sequentially -- melange v0.49.0 bubblewrap
          # runner has a bind-mount race when building multiple arches
          # in parallel, causing web/dist/ to be invisible in one guest.
          # TODO(#1492, review 2026-Q3): revisit once setup-melange pin
          # advances past v1.6.15 / melange > 0.49.0 (upstream has a
          # bind-mount concurrency fix in flight).  Parallel arch builds
          # would cut this step from ~6m to ~3m on the critical path.
          for arch in x86_64 aarch64; do
            melange build docker/web/melange.yaml \
              --arch "$arch" \
              --source-dir . \
              --signing-key melange.rsa \
              --out-dir packages/ \
              --vars-file /tmp/melange-vars.yaml
          done

      - name: Upload packages artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-apk-packages
          path: |
            packages/
            melange.rsa.pub
          retention-days: 1

  build-web:
    name: Build Web (apko)
    needs: [version, build-web-assets]
    if: >-
      !cancelled() &&
      needs.version.result == 'success' &&
      needs.build-web-assets.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Prepare work directory
        run: sudo mkdir -p /work && sudo chown "$(id -u):$(id -g)" /work

      - name: Download web-assets apk
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: web-apk-packages
          path: /work

      - name: Set up apko
        uses: ./.github/actions/setup-apko
        with:
          # renovate: datasource=github-releases depName=chainguard-dev/apko
          version: v1.2.4

      - name: Build web image
        run: |
          apko build docker/web/apko.yaml \
            ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7} \
            web.tar

      - name: Load image for scanning
        run: |
          docker load -i web.tar
          docker tag "ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7}-amd64" "ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7}" 2>/dev/null || true

      - name: Compute scan image ref
        id: scan-ref
        run: echo "ref=ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Report image size
        run: scripts/report-image-size.sh "${{ steps.scan-ref.outputs.ref }}" "Web"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: json
          output: trivy-web.json
          exit-code: "0"
          severity: CRITICAL,HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Evaluate Trivy results
        run: scripts/evaluate-scan.sh --verbose trivy-web.json "Web"

      - name: Trivy SARIF scan (web)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: sarif
          output: trivy-web.sarif
          exit-code: "0"
          severity: CRITICAL,HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Upload SARIF to GitHub Security (web)
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web

      - name: CIS Docker Benchmark (web)
        uses: ./.github/actions/cis-scan
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}

      # Hand off the loaded multi-arch apko tarball to the publish-only job.
      # The publish job re-loads the tarball into its daemon rather than
      # rebuilding -- apko builds are deterministic, so this saves ~2min
      # and keeps the scanned bytes identical to the pushed bytes.
      - name: Upload web image tarball for publish job
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-image-tarball
          path: web.tar
          retention-days: 1

  build-web-publish:
    name: Publish Web (apko)
    needs: [version, build-web]
    if: >-
      !cancelled() &&
      needs.build-web.result == 'success' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: image-push
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Download web image tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: web-image-tarball
          path: .

      - name: Load image
        run: |
          docker load -i web.tar

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push web image (multi-arch manifest)
        id: push
        env:
          APP_VERSION: ${{ needs.version.outputs.app_version }}
        run: |
          SHA_TAG="sha-${GITHUB_SHA::7}"
          REPO="ghcr.io/aureliolo/synthorg-web"

          # Push per-arch images
          docker push "${REPO}:${SHA_TAG}-amd64"
          docker push "${REPO}:${SHA_TAG}-arm64"

          # Collect manifest tags (deduplicated -- TAG and APP_VERSION can match)
          declare -A SEEN_TAGS
          MANIFEST_TAGS=()
          for candidate in "${SHA_TAG}" $(
            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              TAG="${GITHUB_REF_NAME#v}"
              echo "${TAG}"
              if [[ "$TAG" != *-dev.* ]]; then
                echo "${TAG%.*}"
                echo "${APP_VERSION}"
              else
                echo "dev"
              fi
            fi
          ); do
            if [ -z "${SEEN_TAGS[$candidate]+x}" ]; then
              SEEN_TAGS[$candidate]=1
              MANIFEST_TAGS+=("$candidate")
            fi
          done

          # Create and push multi-arch manifest for each tag. --amend keeps
          # re-runs on the same SHA safe: a prior successful push leaves the
          # manifest list present, and a plain `create` would fail with
          # "manifest already exists" on retry.
          DIGEST=""
          for t in "${MANIFEST_TAGS[@]}"; do
            docker manifest create --amend "${REPO}:${t}" \
              "${REPO}:${SHA_TAG}-amd64" \
              "${REPO}:${SHA_TAG}-arm64"
            PUSH_OUT=$(docker manifest push "${REPO}:${t}")
            if [ "$t" = "${SHA_TAG}" ]; then
              DIGEST="$PUSH_OUT"
            fi
          done
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then echo "::error::No digest"; exit 1; fi
          set -euo pipefail
          if ! cosign sign --yes ghcr.io/aureliolo/synthorg-web@${DIGEST} 2>&1 | tee /tmp/cosign-out; then
            if grep -q 'createLogEntryConflict' /tmp/cosign-out; then
              echo "::notice::Image already signed -- skipping"
            else exit 1; fi
          fi

      - name: Attest build provenance (SLSA Level 3)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-web
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/aureliolo/synthorg-web@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-web.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-web
          path: sbom-web.cdx.json
          retention-days: 30

  build-sandbox:
    name: Build Sandbox
    needs: [version, build-sandbox-base, build-sandbox-base-publish]
    if: >-
      !cancelled() &&
      needs.version.result == 'success' &&
      needs.build-sandbox-base.result == 'success' &&
      (github.event_name == 'pull_request' || needs.build-sandbox-base-publish.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Build and scan sandbox image
        uses: ./.github/actions/build-scan-image
        with:
          image-name: sandbox
          display-name: Sandbox
          dockerfile: docker/sandbox/Dockerfile
          app-version: ${{ needs.version.outputs.app_version }}
          base-image-repo: ghcr.io/aureliolo/synthorg-sandbox-base
          base-image-tag: ${{ needs.build-sandbox-base.outputs.tag }}
          base-image-digest: ${{ needs.build-sandbox-base-publish.outputs.digest }}
          base-image-artifact-name: ${{ needs.build-sandbox-base.outputs.artifact-name }}
          base-image-tarball-name: ${{ needs.build-sandbox-base.outputs.tarball-name }}

  build-sandbox-publish:
    name: Publish Sandbox
    needs: [version, build-sandbox]
    if: >-
      !cancelled() &&
      needs.build-sandbox.result == 'success' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: image-push
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.publish.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Publish sandbox image
        id: publish
        uses: ./.github/actions/publish-image
        with:
          image-name: sandbox
          app-version: ${{ needs.version.outputs.app_version }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

  build-sidecar:
    name: Build Sidecar
    needs: [version, build-sidecar-base, build-sidecar-base-publish]
    if: >-
      !cancelled() &&
      needs.version.result == 'success' &&
      needs.build-sidecar-base.result == 'success' &&
      (github.event_name == 'pull_request' || needs.build-sidecar-base-publish.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Build and scan sidecar image
        uses: ./.github/actions/build-scan-image
        with:
          image-name: sidecar
          display-name: Sidecar
          dockerfile: docker/sidecar/Dockerfile
          app-version: ${{ needs.version.outputs.app_version }}
          base-image-repo: ghcr.io/aureliolo/synthorg-sidecar-base
          base-image-tag: ${{ needs.build-sidecar-base.outputs.tag }}
          base-image-digest: ${{ needs.build-sidecar-base-publish.outputs.digest }}
          base-image-artifact-name: ${{ needs.build-sidecar-base.outputs.artifact-name }}
          base-image-tarball-name: ${{ needs.build-sidecar-base.outputs.tarball-name }}

  build-sidecar-publish:
    name: Publish Sidecar
    needs: [version, build-sidecar]
    if: >-
      !cancelled() &&
      needs.build-sidecar.result == 'success' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: image-push
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.publish.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Publish sidecar image
        id: publish
        uses: ./.github/actions/publish-image
        with:
          image-name: sidecar
          app-version: ${{ needs.version.outputs.app_version }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

  # Fine-tune ships in two flavors. The matrix builds them in parallel:
  #   - gpu  -> ghcr.io/aureliolo/synthorg-fine-tune-gpu  (bundled CUDA, ~4 GB)
  #   - cpu  -> ghcr.io/aureliolo/synthorg-fine-tune-cpu  (CPU torch, ~1.7 GB)
  # The variant is driven by the FINE_TUNE_EXTRA build-arg; uv routes torch to
  # PyPI (CUDA) or pytorch.org/whl/cpu via [tool.uv.sources] in pyproject.toml.
  build-fine-tune:
    name: Build Fine-Tune (${{ matrix.variant }})
    needs: [version, build-fine-tune-base, build-fine-tune-base-publish]
    if: >-
      !cancelled() &&
      needs.version.result == 'success' &&
      needs.build-fine-tune-base.result == 'success' &&
      (github.event_name == 'pull_request' || needs.build-fine-tune-base-publish.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: gpu
            extra: fine-tune-gpu
          - variant: cpu
            extra: fine-tune-cpu
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Build and scan fine-tune image
        uses: ./.github/actions/build-scan-image
        with:
          image-name: fine-tune-${{ matrix.variant }}
          display-name: "Fine-Tune (${{ matrix.variant }})"
          dockerfile: docker/fine-tune/Dockerfile
          app-version: ${{ needs.version.outputs.app_version }}
          base-image-repo: ghcr.io/aureliolo/synthorg-fine-tune-base
          base-image-tag: ${{ needs.build-fine-tune-base.outputs.tag }}
          base-image-digest: ${{ needs.build-fine-tune-base-publish.outputs.digest }}
          base-image-artifact-name: ${{ needs.build-fine-tune-base.outputs.artifact-name }}
          base-image-tarball-name: ${{ needs.build-fine-tune-base.outputs.tarball-name }}
          extra-build-args: |
            FINE_TUNE_EXTRA=${{ matrix.extra }}
          enable-arm64: "false"
          cache-scope: fine-tune-${{ matrix.variant }}
          free-disk-space: "true"

  build-fine-tune-publish:
    name: Publish Fine-Tune (${{ matrix.variant }})
    needs: [version, build-fine-tune]
    if: >-
      !cancelled() &&
      needs.build-fine-tune.result == 'success' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: gpu
            extra: fine-tune-gpu
          - variant: cpu
            extra: fine-tune-cpu
    environment: image-push
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Fine-tune tarballs are large (~4 GB GPU, ~1.7 GB CPU). Reclaim
      # headroom on the runner before `docker load` doubles the disk
      # usage (archive + daemon copy).
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python
          sudo rm -rf /usr/local/share/powershell /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules
          sudo docker image prune --all --force
          df -h /

      - name: Publish fine-tune image
        id: publish
        uses: ./.github/actions/publish-image
        with:
          image-name: fine-tune-${{ matrix.variant }}
          app-version: ${{ needs.version.outputs.app_version }}
          enable-arm64: "false"
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

      # Matrix jobs can't expose per-variant outputs to `update-release` via
      # `needs.build-fine-tune-publish.outputs.digest` (only the last matrix
      # run wins). Write the digest to a file and upload it; update-release
      # reads both via the `fine-tune-*-digest` artifact pattern.
      - name: Write digest to file
        if: steps.publish.outputs.digest != ''
        env:
          DIGEST: ${{ steps.publish.outputs.digest }}
        run: printf '%s' "$DIGEST" > "fine-tune-${{ matrix.variant }}.digest"

      - name: Upload digest artifact
        if: steps.publish.outputs.digest != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fine-tune-${{ matrix.variant }}-digest
          path: fine-tune-${{ matrix.variant }}.digest
          retention-days: 1

  # Append container image references to the GitHub Release (version tags only)
  update-release:
    name: Update Release Notes
    needs:
      - version
      - build-backend-base
      - build-backend-base-publish
      - build-sandbox-base
      - build-sandbox-base-publish
      - build-sidecar-base
      - build-sidecar-base-publish
      - build-fine-tune-base
      - build-fine-tune-base-publish
      - build-backend-publish
      - build-web-publish
      - build-sandbox-publish
      - build-sidecar-publish
      - build-fine-tune-publish
    if: >-
      startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' &&
      !cancelled() &&
      needs.build-backend-publish.result == 'success' &&
      needs.build-web-publish.result == 'success' &&
      needs.build-sandbox-publish.result == 'success' &&
      needs.build-sidecar-publish.result == 'success' &&
      needs.build-fine-tune-publish.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Uses `release-tags` (v*-only, no privileged secrets), not `release`
    # (main-only, holds RELEASE_PLEASE_TOKEN). This job writes release
    # notes via the ambient `GITHUB_TOKEN`, so it does not need the
    # release-please PAT.
    environment: release-tags
    permissions:
      contents: write
    steps:
      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sbom-*
          merge-multiple: true
          path: sboms

      - name: Download fine-tune digest artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: fine-tune-*-digest
          merge-multiple: true
          path: fine-tune-digests

      - name: Read fine-tune digests
        id: ft-digests
        run: |
          set -euo pipefail
          gpu=$(cat fine-tune-digests/fine-tune-gpu.digest 2>/dev/null || echo "")
          cpu=$(cat fine-tune-digests/fine-tune-cpu.digest 2>/dev/null || echo "")
          if [ -z "$gpu" ] || [ -z "$cpu" ]; then
            echo "::error::Missing fine-tune digest artifact(s): gpu='$gpu' cpu='$cpu'"
            exit 1
          fi
          echo "gpu=${gpu}" >> "$GITHUB_OUTPUT"
          echo "cpu=${cpu}" >> "$GITHUB_OUTPUT"

      - name: Append container images to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          BACKEND_DIGEST: ${{ needs.build-backend-publish.outputs.digest }}
          WEB_DIGEST: ${{ needs.build-web-publish.outputs.digest }}
          SANDBOX_DIGEST: ${{ needs.build-sandbox-publish.outputs.digest }}
          SIDECAR_DIGEST: ${{ needs.build-sidecar-publish.outputs.digest }}
          FINE_TUNE_GPU_DIGEST: ${{ steps.ft-digests.outputs.gpu }}
          FINE_TUNE_CPU_DIGEST: ${{ steps.ft-digests.outputs.cpu }}
        run: |
          set -euo pipefail

          # Validate required inputs
          if [ -z "$TAG" ] || [ -z "$BACKEND_DIGEST" ] || [ -z "$WEB_DIGEST" ] || [ -z "$SANDBOX_DIGEST" ] || [ -z "$SIDECAR_DIGEST" ]; then
            echo "::error::Missing required values: TAG='$TAG' BACKEND_DIGEST='$BACKEND_DIGEST' WEB_DIGEST='$WEB_DIGEST' SANDBOX_DIGEST='$SANDBOX_DIGEST' SIDECAR_DIGEST='$SIDECAR_DIGEST'"
            exit 1
          fi

          # Bounded retry -- Release Please may still be creating the release
          EXISTING=""
          FOUND=0
          for i in $(seq 1 6); do
            if EXISTING=$(gh release view "$TAG" --json body -q '.body // ""' 2>/dev/null); then
              FOUND=1
              break
            fi
            echo "Release '$TAG' not available yet (attempt $i/6), retrying in 10s..."
            sleep 10
          done
          if [ "$FOUND" -ne 1 ]; then
            echo "::error::GitHub release '$TAG' not available after 6 attempts"
            exit 1
          fi

          IMAGES=$(cat <<'BLOCK'

          ## Container Images

          All images are signed with [cosign](https://docs.sigstore.dev/cosign/overview/) (keyless via GitHub OIDC), attested with [SLSA Level 3](https://slsa.dev/spec/v1.0/levels) build provenance, and include CycloneDX SBOMs.

          ### Pull

          | Image | Command |
          |-------|---------|
          | Backend | `docker pull ghcr.io/aureliolo/synthorg-backend:VERSION_PH` |
          | Web | `docker pull ghcr.io/aureliolo/synthorg-web:VERSION_PH` |
          | Sandbox | `docker pull ghcr.io/aureliolo/synthorg-sandbox:VERSION_PH` |
          | Sidecar | `docker pull ghcr.io/aureliolo/synthorg-sidecar:VERSION_PH` |
          | Fine-Tune (GPU) | `docker pull ghcr.io/aureliolo/synthorg-fine-tune-gpu:VERSION_PH` |
          | Fine-Tune (CPU) | `docker pull ghcr.io/aureliolo/synthorg-fine-tune-cpu:VERSION_PH` |

          ### Digest Pins

          Pin to these digests in production for reproducible deployments:

          | Image | Digest |
          |-------|--------|
          | Backend | `BACKEND_DIGEST_PH` |
          | Web | `WEB_DIGEST_PH` |
          | Sandbox | `SANDBOX_DIGEST_PH` |
          | Sidecar | `SIDECAR_DIGEST_PH` |
          | Fine-Tune (GPU) | `FINE_TUNE_GPU_DIGEST_PH` |
          | Fine-Tune (CPU) | `FINE_TUNE_CPU_DIGEST_PH` |

          ### Supply Chain

          <details>
          <summary>Verify signatures (cosign)</summary>

          ```bash
          # Verify any image -- replace IMAGE and DIGEST:
          cosign verify ghcr.io/aureliolo/synthorg-IMAGE@DIGEST \
            --certificate-identity-regexp='github\.com/Aureliolo/synthorg' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
          ```
          </details>

          <details>
          <summary>Verify SLSA provenance (gh CLI)</summary>

          ```bash
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-backend@BACKEND_DIGEST_PH -R Aureliolo/synthorg
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-web@WEB_DIGEST_PH -R Aureliolo/synthorg
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-sandbox@SANDBOX_DIGEST_PH -R Aureliolo/synthorg
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-sidecar@SIDECAR_DIGEST_PH -R Aureliolo/synthorg
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-fine-tune-gpu@FINE_TUNE_GPU_DIGEST_PH -R Aureliolo/synthorg
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-fine-tune-cpu@FINE_TUNE_CPU_DIGEST_PH -R Aureliolo/synthorg
          ```
          </details>

          <details>
          <summary>SBOMs (CycloneDX JSON)</summary>

          Attached to this release as artifacts:
          \`sbom-backend.cdx.json\` | \`sbom-web.cdx.json\` | \`sbom-sandbox.cdx.json\` | \`sbom-sidecar.cdx.json\` | \`sbom-fine-tune-gpu.cdx.json\` | \`sbom-fine-tune-cpu.cdx.json\`
          </details>
          BLOCK
          )
          # Substitute placeholders (strip leading 'v' from tag for image tags)
          IMAGES=${IMAGES//VERSION_PH/${TAG#v}}
          IMAGES=${IMAGES//BACKEND_DIGEST_PH/$BACKEND_DIGEST}
          IMAGES=${IMAGES//WEB_DIGEST_PH/$WEB_DIGEST}
          IMAGES=${IMAGES//SANDBOX_DIGEST_PH/$SANDBOX_DIGEST}
          IMAGES=${IMAGES//SIDECAR_DIGEST_PH/$SIDECAR_DIGEST}
          IMAGES=${IMAGES//FINE_TUNE_GPU_DIGEST_PH/$FINE_TUNE_GPU_DIGEST}
          IMAGES=${IMAGES//FINE_TUNE_CPU_DIGEST_PH/$FINE_TUNE_CPU_DIGEST}

          # Upload container SBOMs to the draft release
          if ls sboms/sbom-*.cdx.json 1>/dev/null 2>&1; then
            gh release upload "$TAG" --clobber sboms/sbom-*.cdx.json
            echo "Container SBOMs uploaded to release."
          else
            echo "::warning::No SBOM files found in sboms/ directory"
          fi

          # Idempotent: strip existing Container Images section before appending.
          # Uses awk to delete only this section (up to the next ## heading), not to EOF.
          CLEANED=$(echo "$EXISTING" | awk '/^## Container Images$/{skip=1; next} /^## /{skip=0} !skip')
          gh release edit "$TAG" --notes "${CLEANED}${IMAGES}"
