name: Build apko base image (scan)
description: >-
  Build an apko-composed base image and run vulnerability scans. Always uploads
  the built image as an artifact so the companion publish-apko-base action can
  push, sign, and attest it on non-PR events with elevated permissions. This
  composite is PR-safe: it needs only `contents: read` and `security-events:
  write` (for the Trivy SARIF upload).

inputs:
  image-name:
    description: "Image name suffix (e.g. backend, sandbox, sidecar, fine-tune)"
    required: true
  apko-yaml:
    description: "Path to apko.yaml relative to repo root"
    required: true
  apko-version:
    description: "apko version to install"
    required: true
    default: "v1.2.3"
  trivy-version:
    description: "Trivy version"
    required: true

outputs:
  tag:
    description: "Image tag (sha-based)"
    value: ${{ steps.image-ref.outputs.tag }}
  artifact-name:
    description: "Name of the uploaded base image tarball artifact"
    value: ${{ inputs.image-name }}-base-image
  tarball-name:
    description: "Filename of the uploaded tarball inside the artifact"
    value: ${{ inputs.image-name }}-base.tar

runs:
  using: composite
  steps:
    - name: Set up apko
      uses: ./.github/actions/setup-apko
      with:
        version: ${{ inputs.apko-version }}

    - name: Compute image tag
      id: image-ref
      shell: bash
      run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

    - name: Build base image
      shell: bash
      env:
        APKO_YAML: ${{ inputs.apko-yaml }}
        IMAGE_NAME: ${{ inputs.image-name }}
      run: |
        TAG="sha-${GITHUB_SHA::7}"
        apko build "${APKO_YAML}" \
          "ghcr.io/aureliolo/synthorg-${IMAGE_NAME}-base:${TAG}" \
          "${IMAGE_NAME}-base.tar"

    - name: Load image for scanning
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
      run: |
        TAG="sha-${GITHUB_SHA::7}"
        docker load -i "${IMAGE_NAME}-base.tar"
        docker tag "ghcr.io/aureliolo/synthorg-${IMAGE_NAME}-base:${TAG}-amd64" "ghcr.io/aureliolo/synthorg-${IMAGE_NAME}-base:${TAG}" 2>/dev/null || true

    - name: Report image size
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
      run: |
        TAG="sha-${GITHUB_SHA::7}"
        scripts/report-image-size.sh "ghcr.io/aureliolo/synthorg-${IMAGE_NAME}-base:${TAG}" "${IMAGE_NAME} Base"

    # Upload the built .tar on every event. On PRs the downstream app build jobs
    # consume it directly; on push/tag the publish-apko-base action downloads it
    # from a companion job that carries the GHCR write permissions.
    - name: Upload base image artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with: # zizmor: ignore[template-injection] -- inputs.image-name is action input, not shell
        name: ${{ inputs.image-name }}-base-image
        path: ${{ inputs.image-name }}-base.tar
        retention-days: 2

    - name: Install Trivy
      shell: bash
      env:
        TRIVY_VERSION: ${{ inputs.trivy-version }}
      run: |
        curl -sfL --retry 3 --retry-delay 5 "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o "/tmp/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
        curl -sfL --retry 3 --retry-delay 5 "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt" -o /tmp/trivy_checksums.txt
        (cd /tmp && grep "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy_checksums.txt | sha256sum -c -)
        tar -xzf "/tmp/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -C /usr/local/bin trivy

    - name: Trivy scan
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
      run: |
        TAG="sha-${GITHUB_SHA::7}"
        IMAGE_REF="ghcr.io/aureliolo/synthorg-${IMAGE_NAME}-base:${TAG}"
        trivy image "${IMAGE_REF}" --format json --output "trivy-${IMAGE_NAME}-base.json" \
          --exit-code 0 --severity CRITICAL,HIGH --ignorefile .github/.trivyignore.yaml

    - name: Evaluate Trivy results
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
      run: scripts/evaluate-scan.sh "trivy-${IMAGE_NAME}-base.json" "${IMAGE_NAME} Base"

    - name: Trivy SARIF scan
      if: always()
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with: # zizmor: ignore[template-injection]
        image-ref: ghcr.io/aureliolo/synthorg-${{ inputs.image-name }}-base:${{ steps.image-ref.outputs.tag }}
        format: sarif
        output: trivy-${{ inputs.image-name }}-base.sarif
        exit-code: "0"
        severity: CRITICAL,HIGH
        trivyignores: .github/.trivyignore.yaml

    - name: Upload SARIF to GitHub Security
      if: always()
      uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      with: # zizmor: ignore[template-injection]
        sarif_file: trivy-${{ inputs.image-name }}-base.sarif
        category: trivy-${{ inputs.image-name }}-base
