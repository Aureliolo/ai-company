name: 'Smoke-test backend container image'
description: |
  Run a backend container image and verify it serves a 200 response
  on its API liveness endpoint. Catches:
    - image builds green but crashes at startup (missing migration,
      env mismatch, library regression, broken entrypoint)
    - 404 on the wrong probe URL (e.g. `/healthz` vs the actual
      `/api/v1/healthz` mount point)

  This composite action is the single source of truth for the
  backend image smoke test. It runs at build time in `docker.yml`
  on every event that builds the backend image (PR, push to main,
  v* tag pushes, workflow_dispatch) so a broken image fails the
  originating commit with a red ❌ on the commit row, never the
  release-time finalize step after a tag has already been cut.

inputs:
  image:
    description: |
      Image reference to run. Must be loadable via `docker run`
      (either already in the local daemon from a preceding build, or
      pullable from a registry the runner has access to).
    required: true
  host-port:
    description: |
      Host port to bind on the runner for the probe. Independent of
      the in-container listen port: useful when smoke-testing more
      than one image in parallel on the same runner. default: 3001.
    required: false
    default: '3001'
  container-port:
    description: |
      Port the backend listens on inside the container. The synthorg
      backend (Litestar) listens on 3001 by default; override only if
      a future image changes its bound port. default: 3001.
    required: false
    default: '3001'
  path:
    description: 'HTTP path to probe. default: /api/v1/healthz (Litestar liveness, mounted under /api/v1).'
    required: false
    default: '/api/v1/healthz'
  deadline-seconds:
    description: 'Total deadline for the probe to return 200. default: 120'
    required: false
    default: '120'
  attempt-timeout-seconds:
    description: |
      Per-attempt curl timeout. Without this, default curl behaviour
      can wait up to the OS TCP-connect timeout (~75s on Linux),
      which would let a single hung request blow past
      `deadline-seconds`. Each attempt is bounded by this value.
      default: 5.
    required: false
    default: '5'

runs:
  using: 'composite'
  steps:
    - name: Run image and probe liveness
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        HOST_PORT: ${{ inputs.host-port }}
        CONTAINER_PORT: ${{ inputs.container-port }}
        PROBE_PATH: ${{ inputs.path }}
        DEADLINE: ${{ inputs.deadline-seconds }}
        ATTEMPT_TIMEOUT: ${{ inputs.attempt-timeout-seconds }}
      run: |
        set -euo pipefail

        echo "Starting container from $IMAGE (host:${HOST_PORT} -> container:${CONTAINER_PORT})"
        # The image's setup wizard falls back to ephemeral SQLite when
        # no DATABASE_URL is provided -- sufficient for a liveness
        # smoke without provisioning external state.
        #
        # SYNTHORG_PAGINATION_CURSOR_SECRET: final-tag images bake
        # DEPLOYMENT_ENV=prod, and the prod-strict guard in
        # synthorg.api.app refuses to start with an ephemeral cursor
        # secret. Pass a clearly-bogus stable value (>= 16 bytes) so
        # the smoke test exercises the same boot path as a properly
        # configured prod deployment without needing real secrets.
        #
        # NOTE: deliberately NO --rm. If the container crashes
        # immediately at startup, --rm would have docker remove it
        # before the trap's `docker logs` could read it, leaving no
        # forensic trail. We `docker rm -f` explicitly in the trap
        # AFTER the logs are dumped so the postmortem still works.
        CID=$(docker run -d -p "${HOST_PORT}:${CONTAINER_PORT}" \
          -e SYNTHORG_PAGINATION_CURSOR_SECRET=smoke-test-not-a-real-cursor-secret \
          "$IMAGE")
        # Always dump the last 50 lines of container logs on exit so
        # flake postmortems have something to look at, then force-rm
        # the container so the runner does not leak it.
        trap 'docker logs "$CID" 2>&1 | tail -50; docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT

        PROBE_URL="http://localhost:${HOST_PORT}${PROBE_PATH}"
        echo "Polling $PROBE_URL (deadline ${DEADLINE}s, per-attempt timeout ${ATTEMPT_TIMEOUT}s)"

        # Each attempt records the HTTP status so the log shows WHY the
        # probe was still failing (boot time, 5xx, conn-refused) --
        # `curl -sf` on its own silently exits 22 on any non-2xx.
        # `--max-time` bounds the total time of each attempt (connect +
        # transfer) so a single hung request cannot push past the
        # overall deadline. Without it, default curl waits ~75s on the
        # Linux TCP-connect timeout, which would burn most of a 120s
        # deadline on the first stuck attempt alone.
        deadline=$((SECONDS + DEADLINE))
        while [ "$SECONDS" -lt "$deadline" ]; do
          attempt_code=$(curl -s -o /dev/null -w '%{http_code}' \
            --max-time "$ATTEMPT_TIMEOUT" \
            "$PROBE_URL" 2>/dev/null || echo "conn-refused")
          if [ "$attempt_code" = "200" ]; then
            echo "$PROBE_URL returned 200 after ${SECONDS}s"
            exit 0
          fi
          echo "  attempt at ${SECONDS}s: ${attempt_code}"
          sleep 3
        done

        echo "::error::$PROBE_URL did not return 200 within ${DEADLINE}s"
        exit 1
