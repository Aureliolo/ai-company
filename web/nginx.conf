map $http_x_forwarded_proto $x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 8080;
    server_name _;
    server_tokens off;
    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip: serve pre-compressed .gz files built by Vite stage; fall back to
    # on-the-fly compression for anything not pre-compressed.
    gzip_static on;
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # CSP nonce activation (not yet enabled):
    # 1. Add: map $request_id $csp_nonce { default $request_id; }
    #    (or generate via set_by_lua / sub_filter from a random source)
    # 2. Add: sub_filter '__CSP_NONCE__' '$csp_nonce';
    #         sub_filter_once off;
    # 3. Uncomment <meta name="csp-nonce"> in index.html
    # 4. Replace 'unsafe-inline' with 'nonce-$csp_nonce' in security-headers.conf
    # See also: web/src/lib/csp.ts (runtime reader) and App.tsx (MotionConfig)

    # Security headers
    # NOTE: nginx does not inherit add_header directives from the server block
    # into location blocks that define their own add_header. If you add headers
    # to a location block, you must include the security-headers snippet there.
    include /etc/nginx/security-headers.conf;

    # Entry point -- always revalidate to pick up new hashed asset references
    location = /index.html {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # Hashed static assets -- immutable, cache indefinitely
    # Vite outputs content-hashed filenames into assets/ (e.g., index-BxYz1234.js)
    location /assets/ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # MkDocs documentation -- static HTML, not part of the React SPA.
    # MAINTENANCE: headers are declared inline (not via include) because the CSP
    # must differ from security-headers.conf. If you add headers there, mirror
    # them here -- nginx does not inherit add_header across blocks.
    location /docs/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        # worker-src blob: -- MkDocs Material search creates inline Web Workers
        # via Blob URLs; unsafe-inline -- Material injects inline styles for
        # syntax highlighting and theme state.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; worker-src blob:; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri $uri/ =404;
    }

    # SPA routing -- try static files, fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket proxy -- MUST be before generic /api/ block
    location /api/v1/ws {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 3600s;
        # Suppress access logs to avoid recording JWT query parameter
        access_log off;
    }

    # API proxy to backend service
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
    }
}
