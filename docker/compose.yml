services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - synthorg-data:/data
    env_file: .env
    environment:
      SYNTHORG_HOST: "${SYNTHORG_HOST:-0.0.0.0}"
      SYNTHORG_PORT: "${SYNTHORG_PORT:-8000}"
      SYNTHORG_DB_PATH: "/data/synthorg.db"
      SYNTHORG_MEMORY_DIR: "/data/memory"
      # Bridge SYNTHORG_* to uvicorn's native env vars (exec form CMD, no shell)
      UVICORN_HOST: "${SYNTHORG_HOST:-0.0.0.0}"
      UVICORN_PORT: "${SYNTHORG_PORT:-8000}"
    # CIS Docker Benchmark v1.6.0 hardening (5.3, 5.12, 5.25, 5.28)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
    pids_limit: 256
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:8080"
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=16m
      - /var/cache/nginx:nodev,size=32m
      - /var/run:nodev,size=1m
    pids_limit: 64
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: synthorg-net

volumes:
  synthorg-data:
