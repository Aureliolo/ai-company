x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - synthorg-data:/data
    env_file: .env
    environment:
      SYNTHORG_HOST: "${SYNTHORG_HOST:-0.0.0.0}"
      SYNTHORG_PORT: "${SYNTHORG_PORT:-3001}"
      SYNTHORG_DB_PATH: "/data/synthorg.db"
      SYNTHORG_MEMORY_DIR: "/data/memory"
      SYNTHORG_LOG_DIR: "${SYNTHORG_LOG_DIR:-/data/logs}"
      SYNTHORG_LOG_LEVEL: "${SYNTHORG_LOG_LEVEL:-info}"
      MEM0_TELEMETRY: "${MEM0_TELEMETRY:-false}"
      UVICORN_HOST: "${SYNTHORG_HOST:-0.0.0.0}"
      UVICORN_PORT: "${SYNTHORG_PORT:-3001}"
      SYNTHORG_BUS_BACKEND: "${SYNTHORG_BUS_BACKEND:-internal}"
      SYNTHORG_NATS_URL: "${SYNTHORG_NATS_URL:-nats://nats:4222}"
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
          pids: 256
    logging: *logging

  # DHI NATS JetStream (distributed message bus + task queue).
  # Opt in with `docker compose --profile distributed up`.
  # DHI image is distroless (no shell/wget) -- healthcheck via sidecar.
  nats:
    # renovate: datasource=docker depName=dhi.io/nats
    image: dhi.io/nats:2.12-debian13@sha256:89f40ed3ce7f69ad0af95c264368d3de41d72de604c97e7f1f8bd57d3a2b617f
    profiles: ["distributed"]
    command: ["-js", "-sd", "/data", "-m", "8222", "--max_payload", "4MB"]
    ports:
      - "${NATS_CLIENT_PORT:-3003}:4222"
    volumes:
      - synthorg-nats-data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=16m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
          pids: 64
    logging: *logging

  # Healthcheck sidecar for distroless NATS (no shell/wget inside).
  # Shares NATS network namespace and probes the monitoring endpoint.
  nats-healthcheck:
    # renovate: datasource=docker depName=busybox
    image: busybox:1.37-musl@sha256:19b646668802469d968a05342a601e78da4322a414a7c09b1c9ee25165042138
    profiles: ["distributed"]
    network_mode: "service:nats"
    depends_on:
      - nats
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    entrypoint: ["sleep", "infinity"]
    read_only: true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 8M
          cpus: "0.05"
          pids: 4
    logging: *logging

  # Fine-tuning sidecar (~4 GB, PyTorch + sentence-transformers).
  # Uncomment to enable embedding fine-tuning. Requires local GPU.
  # fine-tune:
  #   image: ghcr.io/aureliolo/synthorg-fine-tune:${SYNTHORG_IMAGE_TAG:-latest}
  #   volumes:
  #     - synthorg-data:/data:ro
  #   depends_on:
  #     backend:
  #       condition: service_healthy
  #   user: "10003:10003"
  #   security_opt:
  #     - no-new-privileges:true
  #   cap_drop:
  #     - ALL
  #   read_only: true
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 8G
  #         cpus: "4.0"
  #   logging: *logging

  web:
    image: ghcr.io/aureliolo/synthorg-web:${SYNTHORG_IMAGE_TAG:-latest}
    ports:
      - "${WEB_PORT:-3000}:8080"
    depends_on:
      backend:
        condition: service_healthy
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=16m
      - /config/caddy:noexec,nosuid,nodev,size=8m
      - /data/caddy:noexec,nosuid,nodev,size=16m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
          pids: 64
    logging: *logging

networks:
  default:
    name: synthorg-net

volumes:
  synthorg-data:
  synthorg-nats-data:
