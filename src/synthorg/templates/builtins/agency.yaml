template:
  name: "Agency"
  description: "Client-focused agency with project management and creative roles"
  version: "1.0.0"
  min_agents: 10
  max_agents: 15
  tags:
    - "agency"
    - "client-work"
    - "creative"

  variables:
    - name: "company_name"
      description: "Name of your agency"
      default: "Creative Agency"
    - name: "budget"
      description: "Monthly budget in USD"
      var_type: "float"
      default: 100.0

  company:
    type: "agency"
    budget_monthly: {{ budget | default(100.0) }}
    autonomy:
      level: "semi"

  departments:
    - name: "operations"
      budget_percent: 20
      head_role: "Project Manager"
    - name: "engineering"
      budget_percent: 35
      head_role: "Full-Stack Developer"
    - name: "design"
      budget_percent: 20
      head_role: "UX Designer"
    - name: "quality_assurance"
      budget_percent: 10
      head_role: "QA Engineer"
    - name: "creative_marketing"
      budget_percent: 15
      head_role: "Brand Strategist"

  agents:
    - role: "Project Manager"
      name: "Nadia Volkov"
      level: "senior"
      model: "medium"
      personality_preset: "process_optimizer"
      department: "operations"
    - role: "Product Manager"
      name: "Chinwe Eze"
      level: "mid"
      model: "medium"
      personality_preset: "strategic_planner"
      department: "operations"
    - role: "Scrum Master"
      name: "Henrik Larsson"
      level: "senior"
      model: "medium"
      personality_preset: "process_optimizer"
      department: "operations"
    - role: "UX Designer"
      name: "Arjun Reddy"
      level: "mid"
      model: "medium"
      personality_preset: "user_advocate"
      department: "design"
    - role: "UI Designer"
      name: "Sakura Ito"
      level: "mid"
      model: "medium"
      personality_preset: "creative_innovator"
      department: "design"
    - role: "Frontend Developer"
      name: "Emeka Obi"
      level: "mid"
      model: "small"
      personality_preset: "creative_innovator"
      department: "engineering"
    - role: "Backend Developer"
      name: "Luciana Torres"
      level: "senior"
