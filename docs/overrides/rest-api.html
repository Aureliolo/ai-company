{% extends "main.html" %}

{% block content %}
<style>
  /* Strip ALL MkDocs Material width constraints so Scalar fills the viewport */
  .md-container,
  .md-main,
  .md-main__inner,
  .md-content,
  .md-content__inner {
    max-width: 100%;
    width: 100%;
    margin: 0;
    padding: 0;
  }
  /* Override the grid layout that constrains content width */
  .md-main__inner {
    display: block;
  }
  /* Hide MkDocs sidebar, TOC, and footer on this page */
  .md-sidebar,
  .md-footer {
    display: none;
  }
  /* Scalar fills remaining viewport height below header */
  .md-content__inner {
    min-height: calc(100vh - 3.6rem);
    display: flex;
    flex-direction: column;
  }
  /* Disclaimer banner */
  .rest-api-banner {
    padding: 0.75rem 1.5rem;
    font-size: 0.85rem;
    opacity: 0.7;
    border-bottom: 1px solid var(--md-default-fg-color--lightest);
    flex-shrink: 0;
  }
  .rest-api-banner code {
    background: var(--md-code-bg-color);
    padding: 0.1rem 0.4rem;
    border-radius: 0.2rem;
    font-size: 0.8rem;
  }
</style>

<div class="rest-api-banner">
  This is a static snapshot of the OpenAPI schema.
  When the server is running, interactive docs are available at
  <code>/docs/api</code> (Scalar) and <code>/docs</code> (OpenAPI JSON).
</div>

<script
  id="api-reference"
  data-url="../_generated/openapi.json"
  data-configuration='{"theme": "default", "layout": "modern"}'
></script>
<script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference@1.48.5"></script>
{% endblock %}
